<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenClaw Hub Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --paper: #f8f2e7;
  --paper-strong: #fffaf1;
  --ink: #1e2426;
  --ink-soft: #30383c;
  --muted: #6a7b84;
  --accent: #d1892d;
  --accent-2: #1a8f7c;
  --accent-3: #c6573d;
  --border: #e3d5c2;
  --panel: rgba(255, 253, 247, 0.92);
  --panel-strong: #fffaf2;
  --shadow: 0 18px 38px rgba(24, 28, 30, 0.12);
  --log-bg: #0f1416;
  --log-ink: #dbe5ea;
  --log-muted: #8ea0a8;
  --ok: #1f9d63;
  --warn: #d28a1f;
  --bad: #c74b3f;
  --info: #1b6f86;
}

body {
  font-family: "Space Grotesk", sans-serif;
  height: 100vh;
  color: var(--ink);
  background: radial-gradient(circle at 12% 20%, rgba(209, 137, 45, 0.2), transparent 45%),
    radial-gradient(circle at 85% 10%, rgba(26, 143, 124, 0.2), transparent 45%),
    linear-gradient(140deg, #f8f2e7 0%, #eff3f4 48%, #f6efe1 100%);
  overflow: hidden;
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

body::before {
  background: radial-gradient(circle at 10% 80%, rgba(197, 101, 61, 0.15), transparent 55%),
    radial-gradient(circle at 90% 70%, rgba(26, 143, 124, 0.12), transparent 60%);
  opacity: 0.8;
}

body::after {
  background-image: linear-gradient(120deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px),
    linear-gradient(200deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
  background-size: 120px 120px, 160px 160px;
  opacity: 0.35;
}

#root {
  height: 100%;
  position: relative;
  z-index: 2;
}

.app {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px 26px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(17, 20, 22, 0.08);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 5;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-logo {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.3);
}

.header-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.header-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.header-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(209, 137, 45, 0.12);
  color: var(--ink-soft);
}

.meta-pill strong {
  font-weight: 700;
  color: var(--ink);
}

.header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  border: none;
  border-radius: 12px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--border);
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 16px rgba(19, 25, 28, 0.08);
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: transparent;
}

.btn-primary:hover {
  background: #dd9b35;
}

.btn-ghost {
  background: transparent;
  color: var(--ink-soft);
}

.btn-warn {
  background: #f2e3cd;
  color: #9b5c12;
  border-color: #eed4b0;
}

.btn-danger {
  background: #f6d3cf;
  color: #a73a30;
  border-color: #f2b8b2;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.layout {
  flex: 1;
  display: flex;
  gap: 18px;
  padding: 20px 24px 24px;
  min-height: 0;
  overflow: hidden;
}

.sidebar {
  width: 280px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.sidebar-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--panel-strong);
}

.sidebar-title {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}

.sidebar-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-2);
}

.sidebar-list {
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.side-item {
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid transparent;
  background: rgba(255, 255, 255, 0.7);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.18s ease;
}

.side-item:hover {
  border-color: var(--accent);
  box-shadow: 0 10px 20px rgba(209, 137, 45, 0.12);
}

.side-item.active {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 12px 24px rgba(209, 137, 45, 0.2);
}

.side-emoji {
  font-size: 20px;
}

.side-info {
  flex: 1;
  min-width: 0;
}

.side-name {
  font-weight: 700;
  font-size: 13px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.side-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--muted);
  box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
}

.status-dot.running {
  background: var(--ok);
  box-shadow: 0 0 10px rgba(31, 157, 99, 0.4);
}

.status-dot.starting {
  background: var(--warn);
  animation: pulse 1.2s ease infinite;
}

.status-dot.error {
  background: var(--bad);
}

.status-dot.stopped {
  background: #8d979f;
}

.content {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 0;
  overflow: hidden;
  min-height: 0;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}

.section-sub {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 18px;
}

.panel {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
}

.panel-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}

.stat-card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  box-shadow: 0 4px 12px rgba(24, 28, 30, 0.04);
  animation: rise 0.4s ease both;
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 2px;
}

.stat-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
}

.gateway-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
}

.gateway-card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  animation: rise 0.5s ease both;
}

.gateway-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 32px rgba(20, 25, 28, 0.14);
}

.gateway-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.gateway-name {
  font-size: 15px;
  font-weight: 700;
}

.gateway-id {
  font-size: 11px;
  color: var(--muted);
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(31, 157, 99, 0.12);
  color: var(--ink-soft);
}

.status-badge.starting {
  background: rgba(210, 138, 31, 0.18);
}

.status-badge.error {
  background: rgba(199, 75, 63, 0.15);
}

.status-badge.stopped,
.status-badge.unknown {
  background: rgba(120, 130, 136, 0.16);
}

.gateway-meta {
  margin-top: 12px;
  display: grid;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}

.gateway-actions {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tabs {
  display: flex;
  gap: 18px;
  border-bottom: 1px solid var(--border);
  margin: 14px 0 18px;
}

.tab {
  padding: 8px 0;
  font-weight: 600;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  position: relative;
}

.tab.active {
  color: var(--ink);
}

.tab.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -1px;
  height: 2px;
  background: var(--accent);
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.info-card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
}

.info-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}

.info-value {
  font-size: 14px;
  font-weight: 600;
}

.info-block {
  margin-top: 16px;
  padding: 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--panel-strong);
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.8;
}

.log-panel {
  background: var(--log-bg);
  border-radius: 16px;
  border: 1px solid #1c2328;
  overflow: hidden;
}

.log-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: #131a1e;
  color: var(--log-muted);
  font-size: 12px;
}

.log-body {
  height: 360px;
  overflow-y: auto;
  padding: 12px 14px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  color: var(--log-ink);
  line-height: 1.7;
}

.log-line {
  white-space: pre-wrap;
  word-break: break-word;
}

.log-empty {
  text-align: center;
  color: var(--log-muted);
  padding: 40px 0;
}

.file-grid {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
}

.file-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.file-item {
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel-strong);
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.file-item:hover,
.file-item.active {
  border-color: var(--accent);
  box-shadow: 0 10px 18px rgba(209, 137, 45, 0.12);
}

.file-item span {
  font-size: 13px;
  font-weight: 600;
}

.file-meta {
  font-size: 11px;
  color: var(--muted);
  margin-left: auto;
}

.editor-panel {
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--panel-strong);
}

.editor-header {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.6);
}

.editor-path {
  font-size: 11px;
  color: var(--muted);
  font-family: "JetBrains Mono", monospace;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

textarea.editor {
  width: 100%;
  height: 380px;
  border: none;
  padding: 14px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12.5px;
  line-height: 1.7;
  background: #fdfbf8;
  color: var(--ink);
  resize: vertical;
  outline: none;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 12, 13, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99;
}

.modal {
  width: 520px;
  max-width: 92vw;
  border-radius: 20px;
  background: var(--panel-strong);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 22px;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 6px;
}

.input,
.select,
.field textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 9px 12px;
  font-size: 13px;
  background: #fff;
  font-family: inherit;
  outline: none;
}

.helper {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 10px;
}

.toast-container {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 120;
}

.toast {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  background: #fff;
  border: 1px solid var(--border);
  box-shadow: 0 8px 18px rgba(18, 23, 25, 0.12);
  animation: slideIn 0.25s ease;
}

.toast.success {
  border-color: rgba(31, 157, 99, 0.3);
  color: #1a6c49;
}

.toast.error {
  border-color: rgba(199, 75, 63, 0.3);
  color: #9b3b31;
}

.toast.info {
  border-color: rgba(27, 111, 134, 0.3);
  color: #1b5a70;
}

.empty-state {
  text-align: center;
  color: var(--muted);
  padding: 50px 20px;
}

.loading {
  font-size: 13px;
  color: var(--muted);
  padding: 20px 24px;
}

@keyframes pulse {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.4;
  }
}

@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@media (max-width: 1100px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
  }

  .content {
    width: 100%;
  }

  .file-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .header {
    flex-wrap: wrap;
  }

  .header-actions {
    width: 100%;
    justify-content: flex-start;
  }

  .stats-grid {
    grid-template-columns: 1fr 1fr;
  }

  .gateway-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 540px) {
  .stats-grid {
    grid-template-columns: 1fr;
  }
}

.ledger-entry {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12.5px;
  line-height: 1.6;
  transition: background 0.15s;
  align-items: flex-start;
}

.ledger-entry:hover {
  background: rgba(209, 137, 45, 0.06);
}

.ledger-ts {
  flex-shrink: 0;
  color: var(--muted);
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  min-width: 110px;
  padding-top: 1px;
}

.ledger-badge {
  flex-shrink: 0;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  min-width: 56px;
  text-align: center;
}

.ledger-badge.type-group { background: rgba(26, 143, 124, 0.15); color: #147a6a; }
.ledger-badge.type-chat { background: rgba(27, 111, 134, 0.15); color: #1b5a70; }
.ledger-badge.type-whisper { background: rgba(138, 79, 168, 0.18); color: #6d3a8a; }
.ledger-badge.type-decree { background: rgba(209, 137, 45, 0.2); color: #9b5c12; }
.ledger-badge.type-eunuch_log { background: rgba(199, 75, 63, 0.12); color: #a73a30; }

.ledger-sender {
  flex-shrink: 0;
  font-weight: 600;
  color: var(--ink);
  min-width: 60px;
}

.ledger-content {
  flex: 1;
  color: var(--ink-soft);
  word-break: break-word;
}

.ledger-list {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 280px);
}

.ledger-divider {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  padding: 6px 0;
  letter-spacing: 0.1em;
}

.type-filter {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: #fff;
  transition: all 0.15s;
}

.type-filter.active {
  border-color: var(--accent);
  background: rgba(209, 137, 45, 0.1);
}

.type-filter:hover {
  border-color: var(--accent);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const STATUS_LABELS = {
  running: "运行中",
  stopped: "已停止",
  starting: "启动中",
  error: "错误",
  unknown: "未知",
};

function statusLabel(status) {
  return STATUS_LABELS[status] || "未知";
}

function formatTime(value) {
  if (!value) return "—";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "—";
  return date.toLocaleString("zh-CN");
}

// (Game-specific metrics and radar chart removed — Arena mode)

async function api(method, path, body) {
  const options = { method, headers: { "Content-Type": "application/json" } };
  if (body !== undefined) options.body = JSON.stringify(body);
  const res = await fetch(path, options);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

let pushToast = null;
function toast(message, type = "info") {
  if (!pushToast) return;
  const id = `${Date.now()}-${Math.random()}`;
  pushToast((prev) => [...prev, { id, message, type }]);
  setTimeout(() => pushToast((prev) => prev.filter((item) => item.id !== id)), 3500);
}

function Toasts() {
  const [items, setItems] = useState([]);
  useEffect(() => {
    pushToast = setItems;
    return () => {
      pushToast = null;
    };
  }, []);
  return (
    <div className="toast-container">
      {items.map((item) => (

                <td style={{ padding: "8px 14px", textAlign: "right", fontFamily: "JetBrains Mono, monospace" }}>{fmt(m.output)}</td>

function OverviewPanel({ gateways, onSelect, onRefresh }) {
  const running = gateways.filter((g) => g.status === "running").length;
  const starting = gateways.filter((g) => g.status === "starting").length;
  const stopped = gateways.length - running - starting;
  const tokenMissing = gateways.filter((g) => !g.token_configured).length;

  const [nuking, setNuking] = useState(false);

  const handleAction = async (event, gw, action) => {
    event.stopPropagation();
    try {
      await api("POST", `/api/gateways/${gw.id}/${action}`);
      toast(
        `${gw.name} ${action === "start" ? "启动" : action === "stop" ? "停止" : "重启"}指令已发送`,
        "success"
      );
      setTimeout(onRefresh, 1200);
    } catch (err) {
      toast(err.message, "error");
    }
  };

  const nukeAll = async () => {
    if (!confirm("重置所有 Agent 的心流？\n\n将新建空白会话，清空记忆和内参。\n所有 Gateway 会自动重启。")) return;
    setNuking(true);
    try {
      const result = await api("POST", "/api/gateways/reset-all-sessions");
      toast(`全部心流已重置：${result.total_sessions_reset} 个会话已重建`, "success");
      setTimeout(onRefresh, 2000);
    } catch (err) {
      toast(err.message, "error");
    }
    setNuking(false);
  };

  return (
    <div style={{ padding: "20px 24px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, marginBottom: 4 }}>
        <div>
          <div className="section-title">Gateway 集群概览</div>
          <div className="section-sub">实时状态、端口占用与 Token 配置情况</div>
        </div>
        <button className="btn btn-warn" onClick={nukeAll} disabled={nuking} title="新建空白会话，清空记忆和内参">
          {nuking ? "重置中…" : "🔄 重置所有心流"}
        </button>
      </div>

      <div className="stats-grid">
        {[
          { label: "总实例", value: gateways.length },
          { label: "运行中", value: running },
          { label: "启动中", value: starting },
          { label: "已停止", value: stopped },
          { label: "未配置 Token", value: tokenMissing },
        ].map((item, idx) => (
          <div key={item.label} className="stat-card" style={{ animationDelay: `${idx * 0.05}s` }}>
            <div className="stat-label">{item.label}</div>
            <div className="stat-value">{item.value}</div>
          </div>
        ))}
      </div>

      <div className="gateway-grid">
        {gateways.map((gw, idx) => (
          <div
            key={gw.id}
            className="gateway-card"
            style={{ animationDelay: `${idx * 0.04}s` }}
            onClick={() => onSelect(gw.id)}
          >
            <div className="gateway-card-head">
              <div>
                <div className="gateway-name">
                  {gw.emoji} {gw.name}
                </div>
                <div className="gateway-id">{gw.id} · :{gw.port}</div>
              </div>
              <StatusBadge status={gw.status} />
            </div>
            <div className="gateway-meta">
              <div>PID: {gw.pid || "—"}</div>
              <div>重启次数: {gw.restart_count}</div>
              <div>Token: {gw.token_configured ? "已配置" : "未配置"}</div>
            </div>
            <div className="gateway-actions">
              {gw.status === "running" ? (
                <button className="btn btn-warn" onClick={(event) => handleAction(event, gw, "stop")}>⏹ 停止</button>
              ) : (
                <button className="btn btn-primary" onClick={(event) => handleAction(event, gw, "start")}>▶ 启动</button>
              )}
              <button className="btn btn-ghost" onClick={(event) => handleAction(event, gw, "restart")}>↺ 重启</button>
            </div>
          </div>
        ))}
      </div>

      {gateways.length === 0 && (
        <div className="empty-state">暂无 Gateway 实例，请点击右上角新增。</div>
      )}

      <ModelStatsPanel />
    </div>
  );
}

function LogPanel({ gatewayId }) {
  const [lines, setLines] = useState([]);
  const [follow, setFollow] = useState(true);
  const offsetRef = useRef(0);
  const logRef = useRef(null);

  useEffect(() => {
    setLines([]);
    offsetRef.current = 0;
  }, [gatewayId]);

  useEffect(() => {
    const timer = setInterval(async () => {
      try {
        const data = await api("GET", `/api/gateways/${gatewayId}/logs?offset=${offsetRef.current}`);
        if (data.lines && data.lines.length) {
          setLines((prev) => [...prev, ...data.lines].slice(-3000));
          offsetRef.current = data.offset;
        }
      } catch (err) {
        // ignore log errors while polling
      }
    }, 1000);
    return () => clearInterval(timer);
  }, [gatewayId]);

  useEffect(() => {
    if (follow && logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [lines, follow]);

  const handleScroll = () => {
    const el = logRef.current;
    if (!el) return;
    const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 24;
    setFollow(nearBottom);
  };

  return (
    <div className="log-panel">
      <div className="log-toolbar">
        <span>实时日志 · {lines.length} 行</span>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-ghost" onClick={() => setFollow((prev) => !prev)}>
            {follow ? "暂停滚动" : "跟随"}
          </button>
          <button
            className="btn btn-ghost"
            onClick={() => {
              setLines([]);
              offsetRef.current = 0;
            }}
          >
            清空
          </button>
        </div>
      </div>
      <div className="log-body" ref={logRef} onScroll={handleScroll}>
        {lines.length === 0 ? (
          <div className="log-empty">暂无输出，启动 Gateway 后查看实时日志。</div>
        ) : (
          lines.map((line, idx) => (
            <div className="log-line" key={`${idx}-${line.slice(0, 16)}`}>
              {line}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function FileEditor({ gateway }) {
  const [files, setFiles] = useState([]);
  const [selected, setSelected] = useState(null);
  const [content, setContent] = useState("");
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [dirty, setDirty] = useState(false);

  const loadFiles = useCallback(async () => {
    try {
      const list = await api("GET", `/api/gateways/${gateway.id}/files`);
      setFiles(list);
    } catch (err) {
      toast(err.message, "error");
    }
  }, [gateway.id]);

  useEffect(() => {
    loadFiles();
    setSelected(null);
    setContent("");
    setDirty(false);
  }, [loadFiles]);

  const openFile = async (rel) => {
    if (dirty && !confirm("当前文件未保存，确定切换？")) return;
    setLoading(true);
    try {
      const data = await api(
        "GET",
        `/api/gateways/${gateway.id}/files/read?path=${encodeURIComponent(rel)}`
      );
      setSelected(rel);
      setContent(data.content || "");
      setDirty(false);
    } catch (err) {
      toast(err.message, "error");
    }
    setLoading(false);
  };

  const saveFile = async () => {
    if (!selected) return;
    setSaving(true);
    try {
      await api("PUT", `/api/gateways/${gateway.id}/files/write`, {
        path: selected,
        content,
      });
      toast("文件已保存", "success");
      setDirty(false);
      loadFiles();
    } catch (err) {
      toast(err.message, "error");
    }
    setSaving(false);
  };

  return (
    <div className="file-grid">
      <div className="file-list">
        {files.map((file) => (
          <div
            key={file.rel}
            className={`file-item ${selected === file.rel ? "active" : ""}`}
            onClick={() => openFile(file.rel)}
          >
            <span>{file.name}</span>
            {file.exists && <span className="file-meta">{(file.size / 1024).toFixed(1)} KB</span>}
          </div>
        ))}
        {files.length === 0 && <div className="empty-state">暂无可编辑文件</div>}
      </div>
      <div className="editor-panel">
        <div className="editor-header">
          <div className="editor-path">
            {selected || "请选择文件"}
            {dirty ? " *" : ""}
          </div>
          <button className="btn btn-primary" onClick={saveFile} disabled={!dirty || saving}>
            {saving ? "保存中..." : "保存"}
          </button>
        </div>
        {loading ? (
          <div className="loading">加载中...</div>
        ) : (
          <textarea
            className="editor"
            value={content}
            onChange={(event) => {
              setContent(event.target.value);
              setDirty(true);
            }}
            spellCheck={false}
            placeholder="请选择左侧文件查看或编辑内容"
          />
        )}
      </div>
    </div>
  );
}

const KNOWN_MODELS = [
  { value: "kimi-coding/k2p5", label: "Kimi K2.5" },
  { value: "anthropic/claude-opus-4-6", label: "Claude Opus 4.6" },
  { value: "anthropic/claude-sonnet-4-5", label: "Claude Sonnet 4.5" },

];

function AddGatewayModal({ onClose, onAdded, gateways }) {
  const [form, setForm] = useState({
    id: "", name: "",
    primary_model: "minimax/MiniMax-M2.5",
  });
  const [saving, setSaving] = useState(false);
  // Character validation state: null = not checked, object = result
  const [charCheck, setCharCheck] = useState(null);
  const [checking, setChecking] = useState(false);
  const checkTimer = React.useRef(null);

  const update = (key, value) => setForm((prev) => ({ ...prev, [key]: value }));

  // Auto-calculate next port from existing gateways (step 2, skip 61000 = hub server)
  const nextPort = React.useMemo(() => {
    const ports = (gateways || []).map(g => g.port || 0).filter(p => p > 0);
    const maxPort = Math.max(...ports, 61000);
    let candidate = maxPort + 2;
    if (candidate === 61000) candidate += 2;
    return candidate;
  }, [gateways]);

  // Debounced character validation
  const validateName = React.useCallback((name) => {
    if (checkTimer.current) clearTimeout(checkTimer.current);
    const trimmed = (name || "").trim();
    if (!trimmed) { setCharCheck(null); return; }
    setChecking(true);
    setCharCheck(null);
    checkTimer.current = setTimeout(async () => {
      try {
        const res = await api("POST", "/api/validate-character", { name: trimmed });
        setCharCheck(res);
      } catch (e) {
        setCharCheck({ valid: true, emoji: "🪭", reason: "验证服务不可用", source: "error" });
      }
      setChecking(false);
    }, 600);
  }, []);

  const handleNameChange = (val) => {
    update("name", val);
    // Auto-fill ID from name (pinyin-like: just lowercase the value)
    if (!form.id || form.id === form.name.trim().toLowerCase().replace(/\s/g, "_")) {
      update("id", val.trim().toLowerCase().replace(/\s/g, "_"));
    }
    validateName(val);
  };

  const isValid = charCheck && charCheck.valid;
  const isInvalid = charCheck && !charCheck.valid;
  const canSubmit = form.id && form.name && !saving && !checking && !isInvalid;

  const handleSave = async () => {
    if (!canSubmit) return;
    setSaving(true);
    try {
      const payload = {
        id: form.id.trim().toLowerCase().replace(/\s/g, "_"),
        name: form.name.trim(),
        emoji: (charCheck && charCheck.emoji) || "🪭",
        port: nextPort,
        primary_model: form.primary_model,
        character_name: (charCheck && charCheck.character_name) || form.name.trim(),
      };
      const gw = await api("POST", "/api/gateways", payload);
      toast(`"${gw.name}" 已创建（端口 ${nextPort}）`, "success");
      onAdded(gw);
      onClose();
    } catch (err) {
      toast(err.message, "error");
    }
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={(event) => event.target === event.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">➕ 新增 Gateway 实例</div>
        <div className="field">
          <label>ID *</label>
          <input
            className="input"
            value={form.id}
            onChange={(event) => update("id", event.target.value)}
            placeholder="yangguifei"
          />
          <div className="helper">唯一标识符，小写字母/数字/下划线，建议用拼音</div>
        </div>
        <div className="field">
          <label>角色名称 *</label>
          <div style={{ position: "relative" }}>
            <input
              className="input"
              value={form.name}
              onChange={(event) => handleNameChange(event.target.value)}
              placeholder="杨贵妃"
              style={{
                paddingRight: 44,
                borderColor: isInvalid ? "var(--bad)" : isValid ? "var(--good, #1a8f7c)" : undefined,
              }}
            />
            <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 18 }}>
              {checking ? "⏳" : charCheck ? (charCheck.emoji || "") : ""}
            </span>
          </div>
          {checking && (
            <div className="helper" style={{ color: "var(--muted)" }}>正在验证角色身份...</div>
          )}
          {isValid && (
            <div className="helper" style={{ color: "var(--good, #1a8f7c)" }}>
              ✓ {charCheck.reason}
            </div>
          )}
          {isInvalid && (
            <div className="helper" style={{ color: "var(--bad)" }}>
              ✗ 无法识别此角色 — {charCheck.reason || "系统无法据此生成人格卡，请使用历史/文学/神话中的已知人物。"}
            </div>
          )}
          {!checking && !charCheck && (
            <div className="helper" style={{ color: "var(--accent)" }}>
              💡 请输入历史、文学、神话、影视中的已知人物名。系统会据此自动生成专家人格卡。
            </div>
          )}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div className="field">
            <label>Primary Model</label>
            <select
              className="select"
              value={form.primary_model}
              onChange={(event) => update("primary_model", event.target.value)}
            >
              {KNOWN_MODELS.map((m) => (
                <option key={m.value} value={m.value}>{m.label}</option>
              ))}
              <option value="">自定义（留空使用模板默认）</option>
            </select>
          </div>
          <div className="field">
            <label>端口</label>

function ExecPanel({ gatewayId }) {
  const [cmd, setCmd] = useState("");
  const [output, setOutput] = useState(null);
  const [running, setRunning] = useState(false);
  const [history, setHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);

  const run = async () => {
    const trimmed = cmd.trim();
    if (!trimmed) return;
    setRunning(true);
    setOutput(null);
    try {
      const data = await api("POST", `/api/gateways/${gatewayId}/exec`, { command: trimmed });
      setOutput(data);
      setHistory((prev) => [trimmed, ...prev.filter((h) => h !== trimmed)].slice(0, 20));
      setHistIdx(-1);
    } catch (err) {
      setOutput({ stderr: err.message, exitcode: -1 });
    }
    setRunning(false);
  };

  const onKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); }
    if (e.key === "ArrowUp" && history.length) {
      const next = Math.min(histIdx + 1, history.length - 1);
      setHistIdx(next);
      setCmd(history[next]);
    }
    if (e.key === "ArrowDown") {
      const next = histIdx - 1;
      if (next < 0) { setHistIdx(-1); setCmd(""); }
      else { setHistIdx(next); setCmd(history[next]); }
    }
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <input
          className="input"
          value={cmd}
          onChange={(e) => setCmd(e.target.value)}
          onKeyDown={onKey}
          placeholder='pairing approve telegram KUWRQ2MT'
          style={{ flex: 1, fontFamily: "monospace" }}
          disabled={running}
        />
        <button className="btn btn-primary" onClick={run} disabled={running || !cmd.trim()}>
          {running ? "..." : "执行"}
        </button>
      </div>
      <div className="helper" style={{ marginBottom: 12 }}>
        自动添加 openclaw 前缀 · 环境变量已注入该 Gateway 的 config/state · 上下箭头浏览历史
      </div>
      {output && (
        <div className="log-container" style={{ maxHeight: 400 }}>
          {output.stdout && <pre style={{ margin: 0, whiteSpace: "pre-wrap", wordBreak: "break-all" }}>{output.stdout}</pre>}
          {output.stderr && <pre style={{ margin: 0, whiteSpace: "pre-wrap", wordBreak: "break-all", color: "#c0392b" }}>{output.stderr}</pre>}
          <div style={{ marginTop: 8, fontSize: 12, opacity: 0.6 }}>exit code: {output.exitcode}</div>
        </div>
      )}
    </div>
  );
}

function ThinkingPanel({ gatewayId }) {
  const [data, setData] = useState({ thinking: [], is_active: false });
  const [expanded, setExpanded] = useState({});
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    try {
      const result = await api("GET", `/api/gateways/${gatewayId}/thinking?limit=300`);
      setData(result);
      setLoading(false);
    } catch (err) {
      setLoading(false);
    }
  }, [gatewayId]);

  useEffect(() => {
    load();
    const t = setInterval(load, 3000);
    return () => clearInterval(t);
  }, [load]);

  const toggleExpand = (i) => setExpanded(prev => ({ ...prev, [i]: !prev[i] }));

  const fmtTime = (ts) => {
    if (!ts) return "";
    try {
      const d = new Date(ts);
      return d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } catch (e) { return ""; }
  };

  const ACTION_TYPE_LABELS = {
    "query_eunuch": "查阅内参",
    "submit_intents": "提交行动意图",
    "submit_actions": "提交行动意图",
  };

  const intentActionLabel = (action) => {
    if (!action) return null;
    const a = action.action || action.type || "";
    const to = action.params?.to || action.to || "";
    const content = action.params?.content || action.content || "";
    const toLabel = to === "owner" ? "用户" : to === "group" ? "群里" : to;
    if (a === "private_say" || a === "chat") return { icon: "💬", label: `私聊 ${toLabel}`, content };
    if (a === "public_say" || a === "group") return { icon: "📢", label: `群发`, content };
    if (a === "whisper") return { icon: "🤫", label: `密信 ${toLabel}`, content };
    if (a === "bribe") return { icon: "💰", label: `通款 ${toLabel}`, content: `${action.params?.amount || ""}两` };
    if (a === "plot_small") return { icon: "🗡", label: `小动作 → ${toLabel}`, content };
    return { icon: "▸", label: a, content };
  };

  const [expandedActions, setExpandedActions] = useState({});
  const toggleAction = (key) => setExpandedActions(prev => ({ ...prev, [key]: !prev[key] }));

  const ExpandableText = ({ text, limit, keyName, style }) => {
    const isLong = text && text.length > limit;
    const isOpen = expandedActions[keyName];
    return (
      <span>
        <span style={style}>{isLong && !isOpen ? text.slice(0, limit) + "…" : text}</span>
        {isLong && (
          <span onClick={(e) => { e.stopPropagation(); toggleAction(keyName); }}
            style={{ marginLeft: 4, fontSize: 10, color: "var(--accent)", cursor: "pointer", userSelect: "none" }}>
            {isOpen ? "收起" : "展开"}
          </span>
        )}
      </span>
    );
  };

  const renderActionRow = (action, rowKey) => {
    if (!action) return null;
    const isReply = action.type === "reply";
    const hasIntents = action.action_detail && Array.isArray(action.action_detail) && action.action_detail.length > 0;

    return (
      <div style={{
        margin: "6px 0 2px 0",
        padding: "7px 12px",
        borderRadius: 8,
        background: isReply ? "rgba(209,137,45,0.07)" : "rgba(26,143,124,0.06)",
        borderLeft: `3px solid ${isReply ? "var(--accent)" : "var(--accent-2)"}`,
        fontSize: 12,
      }}>
        {isReply ? (
          <div>
            <span style={{ color: "var(--muted)", fontSize: 11, marginRight: 6 }}>💬 对王说</span>
            <ExpandableText text={action.text} limit={120} keyName={`${rowKey}-reply`}
              style={{ color: "var(--ink-soft)" }} />
          </div>
        ) : (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: hasIntents ? 6 : 0 }}>
              <span style={{ color: "var(--accent-2)", fontWeight: 600, fontSize: 11 }}>▸ {action.label}</span>
              {action.tool_result_preview && !hasIntents && (
                <ExpandableText text={`→ ${action.tool_result_preview}`} limit={80} keyName={`${rowKey}-preview`}
                  style={{ color: "var(--muted)", fontSize: 10, opacity: 0.8 }} />
              )}
            </div>
            {action.decree_plan && (
              <div style={{
                marginBottom: 6, padding: "4px 8px", borderRadius: 6,
                background: "rgba(180,60,60,0.10)", borderLeft: "3px solid #b43c3c",
                fontSize: 11, color: "#b43c3c", fontWeight: 600,
              }}>
                📋 任务策略：<span style={{ fontWeight: 400, color: "var(--ink-soft)" }}>{action.decree_plan}</span>
              </div>
            )}
            {hasIntents && (
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                {action.action_detail.map((intent, ii) => {
                  const parsed = intentActionLabel(intent);
                  if (!parsed) return null;
                  return (
                    <div key={ii} style={{ display: "flex", gap: 6, alignItems: "flex-start", fontSize: 11 }}>
                      <span style={{ minWidth: 14 }}>{parsed.icon}</span>
                      <span style={{ color: "var(--accent-2)", fontWeight: 600, minWidth: 80 }}>{parsed.label}</span>
                      {parsed.content && (
                        <ExpandableText text={`"${parsed.content}"`} limit={80} keyName={`${rowKey}-intent-${ii}`}
                          style={{ color: "var(--ink-soft)", opacity: 0.85 }} />
                      )}
                    </div>
                  );
                })}
              </div>
            )}
            {action.text && (
              <div style={{ marginTop: 4 }}>
                <ExpandableText text={action.text} limit={100} keyName={`${rowKey}-text`}
                  style={{ color: "var(--ink-soft)", fontSize: 11, opacity: 0.8 }} />
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  const items = data.thinking || [];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
      <div style={{
        flex: 1,
        minHeight: 0,
        overflowY: "auto",
        display: "flex",
        flexDirection: "column",
        gap: 4,
        paddingRight: 2
      }}>
      {loading && <div style={{ color: "var(--muted)", fontSize: 13 }}>加载中…</div>}

      {!loading && items.length === 0 && (
        <div style={{ color: "var(--muted)", fontSize: 13, padding: "20px 0", textAlign: "center" }}>
          暂无思考记录。讨论产生的思考过程和发言内容会在此显示。
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {items.map((item, i) => {
          const isOpen = expanded[i] !== undefined ? expanded[i] : (i >= items.length - 3);
          const fullText = item.thinking || "";
          const preview = fullText.slice(0, 800).replace(/\n/g, " ");
          const isFull = fullText.length <= 800;
          const action = item.action_after;
          return (
            <div key={i}>
              {/* Thinking bubble */}
              <div style={{
                borderRadius: 10, border: "1px solid var(--border)",
                background: "var(--panel-strong)", overflow: "hidden"
              }}>
                <div style={{
                  display: "flex", alignItems: "center", gap: 8,
                  padding: "7px 12px", background: "rgba(107,91,149,0.06)",
                  borderBottom: "1px solid var(--border)",
                  cursor: isFull ? "default" : "pointer"
                }} onClick={() => !isFull && toggleExpand(i)}>
                  <span style={{ fontSize: 13 }}>{item.is_reply ? '💬' : '💭'}</span>
                  <span style={{ fontSize: 11, color: "var(--muted)", minWidth: 64 }}>{fmtTime(item.timestamp)}</span>
                  {!isFull && (
                    <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--muted)" }}>
                      {isOpen ? "▲ 收起" : "▼ 展开"}
                    </span>
                  )}
                </div>
                <div style={{ padding: "8px 14px" }}>
                  <div style={{
                    fontFamily: "JetBrains Mono, monospace", fontSize: 12,
                    lineHeight: 1.65, color: "var(--ink-soft)",
                    whiteSpace: "pre-wrap", wordBreak: "break-word"
                  }}>
                    {isOpen || isFull ? fullText : preview + "…"}
                  </div>
                </div>
              </div>
              {/* Action row below the bubble */}
              {action && renderActionRow(action, i)}
            </div>
          );
        })}
      </div>
      </div>
    </div>
  );
}

function GatewayDetail({ gateway, onRefresh, onDelete }) {
  const [tab, setTab] = useState("overview");
  const [acting, setActing] = useState(false);
  const [showToken, setShowToken] = useState(false);

  const action = async (verb) => {
    setActing(true);
    try {
      await api("POST", `/api/gateways/${gateway.id}/${verb}`);
      toast(`${gateway.name} ${verb === "start" ? "启动" : verb === "stop" ? "停止" : "重启"}指令已发送`, "success");
      setTimeout(onRefresh, 1200);
    } catch (err) {
      toast(err.message, "error");
    }
    setActing(false);
  };

  const compactMemory = async () => {
    if (!confirm(`压缩 ${gateway.name} 的会话记忆？\n超过 100KB 的 session 将被摘要并重置。`)) return;
    setActing(true);
    try {
      const result = await api("POST", `/api/gateways/${gateway.id}/compact-session`, { force: false });
      const compacted = (result.results || []).filter(r => r.action === "compacted");
      const skipped = (result.results || []).filter(r => r.action === "skipped");
      if (compacted.length > 0) {
        toast(`压缩完成：${compacted.length} 个会话已摘要，${skipped.length} 个未达阈值`, "success");
      } else {
        toast(`无需压缩：所有会话均低于 100KB`, "info");
      }
    } catch (err) {
      toast(err.message, "error");
    }
    setActing(false);
  };

  const nukeSession = async () => {
    if (!confirm(`重置 ${gateway.name} 的心流？\n\n将新建空白会话，清空记忆和内参。\nGateway 会自动重启。`)) return;
    setActing(true);
    try {
      const result = await api("POST", `/api/gateways/${gateway.id}/reset-session`);
      toast(`${gateway.name} 心流已重置：${result.sessions_reset} 个会话已重建`, "success");
      setTimeout(onRefresh, 1500);
    } catch (err) {
      toast(err.message, "error");
    }
    setActing(false);
  };

  const remove = async () => {
    const cleanup = confirm(
      `确定删除 "${gateway.name}"？\n\n` +
      `点击「确定」将同时清理磁盘文件（gateway 目录及相关配置）。\n` +
      `此操作不可逆。`
    );
    if (!cleanup) return;
    try {
      const res = await api("DELETE", `/api/gateways/${gateway.id}?cleanup=true`);
      const items = (res.cleaned || []).join("、");
      toast(`${gateway.name} 已删除` + (items ? `，已清理：${items}` : ""), "info");
      onDelete();
    } catch (err) {
      toast(err.message, "error");
    }
  };

  return (
    <div style={{ padding: "20px 24px", height: "100%", minHeight: 0, display: "flex", flexDirection: "column" }}>
      {showToken && (
        <TokenModal
          gateway={gateway}
          onClose={() => setShowToken(false)}
          onSaved={onRefresh}
        />
      )}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
        <div>
          <div className="section-title">{gateway.emoji} {gateway.name}</div>
          <div className="section-sub">ID: {gateway.id} · Port: {gateway.port}</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <StatusBadge status={gateway.status} />
          {gateway.status === "running" ? (
            <button className="btn btn-warn" onClick={() => action("stop")} disabled={acting}>⏹ 停止</button>
          ) : (
            <button className="btn btn-primary" onClick={() => action("start")} disabled={acting}>▶ 启动</button>
          )}
          <button className="btn btn-ghost" onClick={() => action("restart")} disabled={acting}>↺ 重启</button>
          <button className="btn btn-ghost" onClick={() => setShowToken(true)}>🔑 Token</button>
          <button className="btn btn-ghost" onClick={compactMemory} disabled={acting} title="摘要超过100KB的session并重置">🧠 压缩记忆</button>
          <button className="btn btn-warn" onClick={nukeSession} disabled={acting} title="新建空白会话，清空记忆和内参">🔄 重置心流</button>
          <button className="btn btn-danger" onClick={remove}>删除</button>
        </div>
      </div>

      <div className="tabs">
        {[
          { key: "overview", label: "概览" },
          { key: "thinking", label: "🧠 思考流" },
          { key: "logs", label: "实时日志" },
          { key: "files", label: "文件编辑" },
          { key: "heartbeat", label: "心跳" },
          { key: "exec", label: "命令执行" },
        ].map((item) => (
          <div
            key={item.key}
            className={`tab ${tab === item.key ? "active" : ""}`}
            onClick={() => setTab(item.key)}
          >
            {item.label}
          </div>
        ))}
      </div>

      <div style={{ flex: 1, minHeight: 0, overflow: "hidden" }}>
        {tab === "overview" && (
          <div style={{ height: "100%", overflowY: "auto", paddingRight: 2 }}>
            <div className="info-grid">
              <div className="info-card">
                <div className="info-label">状态</div>
                <div className="info-value">{statusLabel(gateway.status)}</div>
              </div>
              <div className="info-card">
                <div className="info-label">PID</div>
                <div className="info-value">{gateway.pid || "—"}</div>
              </div>
              <div className="info-card">
                <div className="info-label">重启次数</div>
                <div className="info-value">{gateway.restart_count}</div>
              </div>
              <div className="info-card">
                <div className="info-label">Token</div>
                <div className="info-value">{gateway.token_configured ? "已配置" : "未配置"}</div>
              </div>
              <div className="info-card">
                <div className="info-label">启动时间</div>
                <div className="info-value">{formatTime(gateway.started_at)}</div>
              </div>
              <div className="info-card">
                <div className="info-label">配置文件</div>
                <div className="info-value">{gateway.config_file}</div>
              </div>
              <ModelSelector gatewayId={gateway.id} />
            </div>
            <div className="info-block">
              <div>工作区: {gateway.workspace_dir}</div>
              <div>状态目录: {gateway.state_dir}</div>
            </div>
            <PersonaRegenSection gatewayId={gateway.id} gatewayName={gateway.name} onRefresh={onRefresh} />
          </div>
        )}
        {tab === "thinking" && <ThinkingPanel gatewayId={gateway.id} />}
        {tab === "logs" && <LogPanel gatewayId={gateway.id} />}
        {tab === "files" && <FileEditor gateway={gateway} />}
        {tab === "heartbeat" && <HeartbeatPanel gatewayId={gateway.id} />}
        {tab === "exec" && <ExecPanel gatewayId={gateway.id} />}
      </div>
    </div>
  );
}

const TYPE_LABELS = {
  group: "群聊",
  chat: "私聊",
  whisper: "密信",
  decree: "公告",
  eunuch_log: "台账",
};

function EunuchPanel() {
  const [data, setData] = useState(null);
  const [filter, setFilter] = useState("all");
  const [loading, setLoading] = useState(true);
  const [rebuilding, setRebuilding] = useState(false);
  const listRef = useRef(null);
  const [autoScroll, setAutoScroll] = useState(true);

  const load = useCallback(async () => {
    try {
      const result = await api("GET", "/api/eunuch/ledger?limit=5000");
      setData(result);
      setLoading(false);
    } catch (err) {
      if (loading) setLoading(false);
    }
  }, []);

  useEffect(() => {
    load();
    const timer = setInterval(load, 5000);
    return () => clearInterval(timer);
  }, [load]);

  useEffect(() => {
    if (autoScroll && listRef.current) {
      listRef.current.scrollTop = 0;
    }
  }, [data, autoScroll]);

  const handleScroll = () => {
    const el = listRef.current;
    if (!el) return;
    setAutoScroll(el.scrollTop < 30);
  };

  if (loading) return <div className="loading">加载中...</div>;
  if (!data) return <div className="empty-state">无法连接消息池</div>;

  const counts = data.counts || {};
  const allTypes = ["group", "chat", "whisper", "decree", "eunuch_log"];
  // "all" = 排除内廷日志噪音，只看实际消息；"eunuch_log" = 单独查看内廷日志
  const entries = (data.entries || []).filter((e) => {
    if (filter === "all") return e.type !== "eunuch_log";
    return e.type === filter;
  }).reverse();

  const visibleCount = (data.entries || []).filter(e => e.type !== "eunuch_log").length;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--ink)" }}>消息池 · 消息台账</div>
        </div>
        <button
          className="btn btn-ghost"
          disabled={rebuilding}
          onClick={async () => {
            try {
              setRebuilding(true);
              const res = await api("POST", "/api/eunuch/rebuild");
              toast(`重建完成，恢复 ${res.recovered_messages || 0} 条`, "success");
              load();
            } catch (e) {
              toast(e.message, "error");
            } finally {
              setRebuilding(false);
            }
          }}
          style={{ fontSize: 12 }}
        >
          {rebuilding ? "⏳ 重建中" : "♻ 重建消息池"}
        </button>
        <button className="btn btn-ghost" onClick={async () => { try { await api("POST", "/api/eunuch/reset"); toast("消息池已清空", "info"); load(); } catch(e) { toast(e.message, "error"); } }} style={{ fontSize: 12 }}>🗑 清空消息池</button>
      </div>

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
        <span
          className={`type-filter ${filter === "all" ? "active" : ""}`}
          onClick={() => setFilter("all")}
        >全部 {visibleCount}</span>
        {allTypes.map((t) => (
          <span
            key={t}
            className={`type-filter ${filter === t ? "active" : ""}`}
            onClick={() => setFilter(t)}
          >{TYPE_LABELS[t]} {counts[t] || 0}</span>
        ))}
      </div>

      <div
        className="ledger-list"
        ref={listRef}
        onScroll={handleScroll}
        style={{
          border: "1px solid var(--border)",
          borderRadius: 14,
          background: "var(--panel-strong)",
        }}
      >
        {entries.length === 0 ? (
          <div className="empty-state">暂无记录</div>
        ) : (
          entries.map((entry, idx) => {
            const ts = (entry.timestamp || "").slice(11, 19);
            const content = entry.content;

            // Build semantic route description from route field (format: "sender>target")
            const routeDesc = (() => {
              if (entry.type === "eunuch_log") return null;
              if (entry.type === "decree") return "公告";
              const route = entry.route || "";
              const parts = route.split(">");
              const target = parts[1] || "";
              const targetLabel = target === "owner" ? "用户"
                : target === "group" ? "群里"
                : target === "" ? ""
                : entry.target || target;
              const senderLabel = entry.sender_display || parts[0] || "";
              if (entry.type === "chat") return `${senderLabel} 私聊 ${targetLabel}`;
              if (entry.type === "group") return `${senderLabel} 群发`;
              if (entry.type === "whisper") return `${senderLabel} 密信 ${targetLabel}`;
              return senderLabel;
            })();

            return (
              <div className="ledger-entry" key={entry.id || idx}>
                <span className="ledger-ts">{ts}</span>
                <span className={`ledger-badge type-${entry.type}`}>
                  {TYPE_LABELS[entry.type] || entry.type}
                </span>
                {routeDesc ? (
                  <span className="ledger-sender" style={{ minWidth: 120, fontWeight: 600 }}>{routeDesc}</span>
                ) : (
                  <span className="ledger-sender">{entry.sender_display}</span>
                )}
                <span className="ledger-content">{content}</span>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function SecretaryPanel() {
  const [log, setLog] = useState("");
  const [topic, setTopic] = useState("");
  const [models, setModels] = useState([]);
  const [selectedModel, setSelectedModel] = useState("");
  const [prompt, setPrompt] = useState(() => {
    try { return localStorage.getItem("secretary_last_prompt") || ""; } catch { return ""; }
  });
  const [genStatus, setGenStatus] = useState("idle"); // idle | generating | done | error
  const [result, setResult] = useState("");
  const [error, setError] = useState("");
  const [loadingLog, setLoadingLog] = useState(true);
  const [showLog, setShowLog] = useState(false);
  const [promptHistory, setPromptHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem("secretary_prompt_history") || "[]"); } catch { return []; }
  });
  const [showPromptHistory, setShowPromptHistory] = useState(false);
  const [savedSummaries, setSavedSummaries] = useState([]); // persistent history from backend

  // Load log + models on mount
  useEffect(() => {
    (async () => {
      try {
        const [logData, modelData, statusData, histData] = await Promise.all([
          api("GET", "/api/arena/secretary/log"),
          api("GET", "/api/arena/secretary/models"),
          api("GET", "/api/arena/secretary/status"),
          api("GET", "/api/arena/secretary/history"),
        ]);
        setLog(logData.log || "");
        setTopic(logData.topic || "");
        setModels(modelData.models || []);
        if (modelData.models?.length) setSelectedModel(modelData.models[0].key);
        // Restore any in-progress or completed generation
        if (statusData.status === "done" && statusData.result) {
          setGenStatus("done");
          setResult(statusData.result);
        } else if (statusData.status === "generating") {
          setGenStatus("generating");
        } else if (statusData.status === "error") {
          setGenStatus("error");
          setError(statusData.error || "未知错误");
        }
        setSavedSummaries(histData.summaries || []);
      } catch (e) { console.error(e); }
      setLoadingLog(false);
    })();
  }, []);

  // Poll status while generating
  useEffect(() => {
    if (genStatus !== "generating") return;
    const iv = setInterval(async () => {
      try {
        const s = await api("GET", "/api/arena/secretary/status");
        if (s.status === "done") {
          setGenStatus("done");
          setResult(s.result || "");
          // Reload persistent history
          try { const h = await api("GET", "/api/arena/secretary/history"); setSavedSummaries(h.summaries || []); } catch {}
          clearInterval(iv);
        } else if (s.status === "error") {
          setGenStatus("error");
          setError(s.error || "生成失败");
          clearInterval(iv);
        }
      } catch (e) {}
    }, 2000);
    return () => clearInterval(iv);
  }, [genStatus]);

  const handleGenerate = async () => {
    if (!selectedModel || !prompt.trim()) return;
    setGenStatus("generating");
    setResult("");
    setError("");
    // Persist prompt to localStorage
    const trimmed = prompt.trim();
    try { localStorage.setItem("secretary_last_prompt", trimmed); } catch {}
    setPromptHistory(prev => {
      const next = [{ text: trimmed, model: selectedModel, time: new Date().toLocaleString() },
        ...prev.filter(h => h.text !== trimmed)].slice(0, 20);
      try { localStorage.setItem("secretary_prompt_history", JSON.stringify(next)); } catch {}
      return next;
    });
    try {
      await api("POST", "/api/arena/secretary/generate", {
        model: selectedModel,
        prompt: trimmed,
        include_log: true,
      });
    } catch (e) {
      setGenStatus("error");
      setError(e.message);
    }
  };

  const handleRefreshLog = async () => {
    setLoadingLog(true);
    try {
      const logData = await api("GET", "/api/arena/secretary/log");
      setLog(logData.log || "");
      setTopic(logData.topic || "");
      toast("讨论记录已刷新", "success");
    } catch (e) { toast(e.message, "error"); }
    setLoadingLog(false);
  };

  const copyResult = () => {
    navigator.clipboard.writeText(result).then(() => toast("已复制到剪贴板", "success"));
  };

  const loadSavedSummary = async (id) => {
    try {
      const data = await api("GET", `/api/arena/secretary/history/${id}`);
      if (data.text) { setResult(data.text); setGenStatus("done"); }
    } catch (e) { toast(e.message, "error"); }
  };

  const deleteSavedSummary = async (id) => {
    if (!confirm("确定删除该存档？")) return;
    try {
      await api("DELETE", `/api/arena/secretary/history/${id}`);
      setSavedSummaries(prev => prev.filter(s => s.id !== id));
      toast("已删除", "info");
    } catch (e) { toast(e.message, "error"); }
  };

  const logLines = log ? log.split("\n").length : 0;
  const logChars = log.length;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
      {/* Header */}
      <div style={{ marginBottom: 10, flexShrink: 0 }}>
        <div className="section-title" style={{ fontSize: 15 }}>📝 书记 · 离线总结</div>
        <div className="section-sub" style={{ fontSize: 11 }}>选模型 → 写提示词 → 生成，无需启动 Gateway</div>
      </div>

      {/* Discussion log compact bar */}
      <div className="panel" style={{ marginBottom: 10, padding: "8px 12px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13 }}>💬</span>
          <span style={{ fontWeight: 600, fontSize: 12 }}>讨论记录</span>
          {log ? (
            <span style={{ fontSize: 11, color: "var(--ok)", fontWeight: 600 }}>
              {logLines} 行 · {logChars > 1000 ? `${(logChars / 1000).toFixed(1)}k` : logChars} 字符
            </span>
          ) : (
            <span style={{ fontSize: 11, color: "var(--muted)" }}>暂无记录</span>
          )}
          {topic && <span style={{ fontSize: 10, color: "var(--accent)", fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 200 }}>议题: {topic}</span>}
          <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
            <button className="btn btn-ghost" onClick={handleRefreshLog} disabled={loadingLog}
              style={{ fontSize: 10, padding: "2px 6px" }}>⟳ 刷新</button>
            {log && (
              <button className="btn btn-ghost" onClick={() => setShowLog(!showLog)}
                style={{ fontSize: 10, padding: "2px 6px" }}>{showLog ? "收起" : "查看"}</button>
            )}
          </div>
        </div>
        {showLog && log && (
          <pre style={{
            background: "#1a1a2e", color: "#e0e0e0", padding: 10, borderRadius: 6,
            fontSize: 11, fontFamily: "JetBrains Mono, monospace", whiteSpace: "pre-wrap",
            maxHeight: 200, overflowY: "auto", lineHeight: 1.5, marginTop: 8,
          }}>{log}</pre>
        )}
      </div>

      {/* Model + Prompt + Generate — single row */}
      <div className="panel" style={{ marginBottom: 10, padding: "8px 12px", flexShrink: 0 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
          <div style={{ flex: "0 0 160px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 3, color: "var(--ink-soft)" }}>模型</div>
            <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)}
              style={{
                width: "100%", padding: "6px 8px", borderRadius: 6,
                border: "1px solid var(--border)", fontSize: 12, background: "#fff",
              }}>
              {models.length === 0 && <option value="">加载中...</option>}
              {models.map(m => (
                <option key={m.key} value={m.key}>{m.label} ({m.provider})</option>
              ))}
            </select>
          </div>
          <div style={{ flex: 1, position: "relative" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-soft)" }}>提示词</div>
              {promptHistory.length > 0 && (
                <button className="btn btn-ghost" onClick={() => setShowPromptHistory(!showPromptHistory)}
                  style={{ fontSize: 9, padding: "0px 5px", color: showPromptHistory ? "var(--accent)" : "var(--muted)" }}>
                  📜 {promptHistory.length}
                </button>
              )}
            </div>
            <input
              value={prompt}
              onChange={e => setPrompt(e.target.value)}
              placeholder="告诉书记你需要什么，例如：整理所有专家的核心观点，按主题分类"
              style={{
                width: "100%", padding: "6px 8px", borderRadius: 6,
                border: "1px solid var(--border)", fontSize: 12, background: "#fff",
              }}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey && prompt.trim() && selectedModel && log) { e.preventDefault(); handleGenerate(); } }}
            />
            {showPromptHistory && promptHistory.length > 0 && (
              <div style={{
                position: "absolute", top: "100%", left: 0, right: 0, zIndex: 10,
                marginTop: 2, border: "1px solid var(--border)", borderRadius: 6,
                background: "#fff", boxShadow: "0 4px 12px rgba(0,0,0,.12)",
                maxHeight: 160, overflowY: "auto",
              }}>
                {promptHistory.map((h, i) => (
                  <div key={i} style={{
                    padding: "5px 8px", cursor: "pointer", fontSize: 11,
                    borderBottom: i < promptHistory.length - 1 ? "1px solid var(--border)" : "none",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                  }}
                    onClick={() => { setPrompt(h.text); setShowPromptHistory(false); }}
                    onMouseOver={e => e.currentTarget.style.background = "var(--surface)"}
                    onMouseOut={e => e.currentTarget.style.background = "transparent"}
                  >
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, marginRight: 6 }}>{h.text}</span>
                    <span style={{ fontSize: 9, color: "var(--muted)", whiteSpace: "nowrap" }}>{h.model} · {h.time}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <button className="btn btn-primary" onClick={handleGenerate}
            disabled={genStatus === "generating" || !selectedModel || !prompt.trim() || !log}
            style={{ padding: "6px 16px", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap", flexShrink: 0 }}>
            {genStatus === "generating" ? (
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ display: "inline-block", width: 12, height: 12, border: "2px solid #fff4", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
                生成中
              </span>
            ) : "🚀 生成"}
          </button>
        </div>
        {!log && <div style={{ fontSize: 10, color: "var(--bad)", marginTop: 4 }}>请先进行一次讨论，或刷新讨论记录</div>}
      </div>

      {/* Result — fills remaining space, internal scroll */}
      {genStatus === "error" && (
        <div className="panel" style={{ marginBottom: 10, padding: "8px 12px", flexShrink: 0, borderColor: "rgba(199,75,63,0.3)" }}>
          <div style={{ color: "var(--bad)", fontSize: 12, fontWeight: 600 }}>⚠ {error}</div>
        </div>
      )}

      {genStatus === "done" && result && (
        <div className="panel" style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexShrink: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 700 }}>📋 书记整理结果</span>
            <span style={{ fontSize: 10, color: "var(--muted)" }}>{result.length} 字符</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
              <button className="btn btn-ghost" onClick={copyResult} style={{ fontSize: 10, padding: "2px 8px" }}>📋 复制</button>
            </div>
          </div>
          <div style={{
            flex: 1, minHeight: 0, overflowY: "auto",
            background: "#fff", border: "1px solid var(--border)", borderRadius: 6,
            padding: 12, fontSize: 13, lineHeight: 1.8, whiteSpace: "pre-wrap",
          }}>{result}</div>
        </div>
      )}

      {/* Persistent history */}
      {savedSummaries.length > 0 && (
        <div className="panel" style={{ flexShrink: 0, padding: "6px 12px", marginBottom: 10 }}>
          <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 4 }}>📜 历史存档</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {savedSummaries.map(s => (
              <div key={s.id} style={{
                padding: "3px 8px", borderRadius: 6,
                background: "var(--paper-strong)", border: "1px solid var(--border)",
                fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 4,
              }} title={`${s.prompt}\n${s.topic}`}>
                <span onClick={() => loadSavedSummary(s.id)} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ fontWeight: 600 }}>{s.model}</span>
                  <span style={{ color: "var(--muted)", fontSize: 9 }}>{s.chars}字 · {s.created_at}</span>
                </span>
                <span onClick={(e) => { e.stopPropagation(); deleteSavedSummary(s.id); }}
                  style={{ color: "var(--muted)", cursor: "pointer", fontSize: 9, marginLeft: 2 }}
                  title="删除">✕</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

  const [output, setOutput] = useState(null);

    setSavingToken(true);
    try {
      // This auto-provisions the herald gateway if it doesn't exist
      await api("POST", "/api/herald/provision", { token: tokenInput.trim() });
      toast("主持人 Gateway 已就绪，Token 已保存", "success");
      setShowTokenEdit(false);
      setTokenInput("");
      loadHerald();
    } catch (err) {
      toast(err.message, "error");
    }
    setSavingToken(false);
  };

  const gwAction = async (verb) => {
    setActing(true);
    try {
      await api("POST", `/api/gateways/herald/${verb}`);
      toast(`主持人 ${verb === "start" ? "启动" : verb === "stop" ? "停止" : "重启"}指令已发送`, "success");
      setTimeout(loadHerald, 1500);
    } catch (err) {
      toast(err.message, "error");
    }
    setActing(false);
  };

  const testPing = async () => {
    setTestingPing(true);
    try {
      await api("POST", "/api/herald/test", { note: "from panel" });
      toast("主持人试音已发送到 Telegram", "success");
      setTimeout(loadHerald, 800);
    } catch (err) {
      toast(err.message, "error");
      setTimeout(loadHerald, 800);
    }
    setTestingPing(false);
  };

  const execCmd = async () => {
    const trimmed = cmd.trim();
    if (!trimmed) return;
    setCmdRunning(true);
    setOutput(null);
    try {
      const data = await api("POST", "/api/gateways/herald/exec", { command: trimmed });
      setOutput(data);
      setHistory((prev) => [trimmed, ...prev.filter((h) => h !== trimmed)].slice(0, 20));
      setHistIdx(-1);
    } catch (err) {
      setOutput({ stderr: err.message, exitcode: -1 });
    }
    setCmdRunning(false);
  };

  const onCmdKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); execCmd(); }
    if (e.key === "ArrowUp" && history.length) {
      const next = Math.min(histIdx + 1, history.length - 1);
      setHistIdx(next);
      setCmd(history[next]);
    }
    if (e.key === "ArrowDown") {
      const next = histIdx - 1;
      if (next < 0) { setHistIdx(-1); setCmd(""); }
      else { setHistIdx(next); setCmd(history[next]); }
    }
  };

  if (loading) return <div className="loading">加载中...</div>;

  const provisioned = herald && herald.provisioned;
  const configured = herald && herald.configured;
  const gwStatus = herald?.gateway?.status || "unknown";
  const gwPort = herald?.gateway?.port || "—";
  const runtime = herald?.runtime || {};
  const maskedToken = herald?.botToken
    ? herald.botToken.slice(0, 8) + "..." + herald.botToken.slice(-4)
    : "";

  const statusColors = { running: "#2ecc71", stopped: "#e74c3c", unknown: "#999" };
  const statusLabels = { running: "运行中", stopped: "已停止", unknown: "未知" };


  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <div style={{ flex: 1 }}>
          <div className="section-title">主持人 · 管理面板</div>
          <div className="section-sub">Bot 管理 · 群聊广播 · 调试</div>
        </div>
      </div>

      {/* ─── 主持人 compact row ─── */}
      <div className="panel" style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span style={{ fontSize: 15 }}>🦉</span>
          <span style={{ fontWeight: 700, fontSize: 13 }}>主持人</span>
          {provisioned && (
            <span style={{ fontSize: 11, color: statusColors[gwStatus], fontWeight: 600 }}>
              ● {statusLabels[gwStatus] || gwStatus}
            </span>
          )}
          {configured && !showTokenEdit && (
            <span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "monospace" }}>{maskedToken}</span>
          )}
          {/* Action buttons — compact icon row */}
          <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center" }}>
            {provisioned && configured && (
              <>
                <button className="btn btn-ghost" onClick={() => gwAction("start")}
                  disabled={acting || gwStatus === "running"}
                  style={{ fontSize: 11, padding: "4px 8px" }} title="启动">▶</button>
                <button className="btn btn-ghost" onClick={() => gwAction("stop")}
                  disabled={acting || gwStatus === "stopped"}
                  style={{ fontSize: 11, padding: "4px 8px" }} title="停止">■</button>
                <button className="btn btn-ghost" onClick={() => gwAction("restart")}
                  disabled={acting}
                  style={{ fontSize: 11, padding: "4px 8px" }} title="重启">↻</button>
                <button className="btn btn-ghost" onClick={testPing}
                  disabled={testingPing || gwStatus !== "running"}
                  style={{ fontSize: 11, padding: "4px 8px" }} title="试音发言">🔔</button>
                <span style={{ width: 1, height: 16, background: "var(--border)", margin: "0 2px" }}></span>
              </>
            )}
            <button className="btn btn-ghost" onClick={() => setShowTokenEdit(!showTokenEdit)}
              style={{ fontSize: 11, padding: "4px 8px" }}>
              {showTokenEdit ? "✕" : "🔑"}
            </button>
            {provisioned && configured && (
              <button className="btn btn-ghost" onClick={() => setShowCmd(!showCmd)}
                style={{ fontSize: 11, padding: "4px 8px", color: showCmd ? "var(--accent)" : undefined }}>
                ⚙️
              </button>
            )}
            <button className="btn btn-ghost" onClick={() => setShowDiag(!showDiag)}
              style={{ fontSize: 11, padding: "4px 8px", color: showDiag ? "var(--accent)" : undefined }}>
              📡
            </button>
          </div>
        </div>

        {/* Token edit (expandable) */}
        {showTokenEdit && (
          <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
            <input className="input" value={tokenInput} onChange={(e) => setTokenInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && saveToken()}
              placeholder="Bot Token (from @BotFather)"
              style={{ flex: 1, fontFamily: "monospace", fontSize: 12 }} />
            <button className="btn btn-primary" onClick={saveToken} disabled={savingToken || !tokenInput.trim()}>
              {savingToken ? "..." : "保存"}
            </button>
          </div>
        )}
        {!configured && !showTokenEdit && (
          <div style={{ marginTop: 8, fontSize: 11, color: "#e67e22" }}>
            请先在 Telegram 创建一个 Bot（@BotFather），然后点击 🔑 填入 Token。
          </div>
        )}

        {/* Diagnostics (expandable) */}
        {showDiag && (
          <div style={{ marginTop: 10, padding: "8px 10px", background: "var(--surface)", borderRadius: 6, border: "1px solid var(--border)", fontSize: 11 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              <span>tick: <strong>{runtime.tick ?? 0}</strong></span>
              <span>尝试: <strong>{runtime.attempted ?? 0}</strong></span>
              <span>成功: <strong style={{ color: "#2ecc71" }}>{runtime.sent ?? 0}</strong></span>
              <span>失败: <strong style={{ color: "#e74c3c" }}>{runtime.failed ?? 0}</strong></span>
              <span style={{ color: "var(--muted)" }}>{runtime.note || ""}</span>
            </div>
            {runtime.last_error && (
              <div style={{ marginTop: 4, color: "#e74c3c", wordBreak: "break-word" }}>⚠ {runtime.last_error}</div>
            )}

        {/* Command line (expandable) */}
        {showCmd && provisioned && configured && (
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
              <input className="input" value={cmd} onChange={(e) => setCmd(e.target.value)}

                disabled={cmdRunning} />
              <button className="btn btn-primary" onClick={execCmd}

              <pre style={{

      </div>
    </div>
  );
}

function GroupPanel() {

  const [sendText, setSendText] = useState("");

  const [editSyncEnabled, setEditSyncEnabled] = useState(true);
  const [editSyncInterval, setEditSyncInterval] = useState(30);
  const [registering, setRegistering] = useState("");
  const [gateways, setGateways] = useState([]);

  const loadGroup = async () => {
    try {
      const g = await api("GET", "/api/group");
      setGroup(g);
      setEditGroupId(g.groupId || "");
      setEditSyncEnabled(g.sync?.enabled ?? true);
      setEditSyncInterval(g.sync?.intervalSeconds ?? 30);
    } catch (e) { toast(e.message, "error"); }
    setLoading(false);
  };

  useEffect(() => {
    loadGroup();
    api("GET", "/api/gateways").then(setGateways).catch(() => {});
  }, []);

  const saveGroupConfig = async () => {
    try {
      await api("PATCH", "/api/group", { groupId: editGroupId, syncEnabled: editSyncEnabled, syncInterval: editSyncInterval });
      toast("群组配置已保存", "success");
      loadGroup();
    } catch (e) { toast(e.message, "error"); }
  };

  const sendMessage = async () => {
    if (!sendText.trim()) return;
    setSending(true);
    try {
      await api("POST", "/api/group/send", { bot_id: sendBot, text: sendText.trim() });
      toast("消息已发送", "success");
      setSendText("");
    } catch (e) { toast(e.message, "error"); }
    setSending(false);
  };

  const registerParticipant = async (gwId) => {
    setRegistering(gwId);
    try {
      await api("POST", "/api/group/participants", { id: gwId });
      toast("已注册到群组", "success");
      loadGroup();
    } catch (e) { toast(e.message, "error"); }
    setRegistering("");
  };

  const removeParticipant = async (pid) => {
    if (!confirm(`确定移除 ${pid}？`)) return;
    try {
      await api("DELETE", `/api/group/participants/${pid}`);
      toast("已移除", "info");
      loadGroup();
    } catch (e) { toast(e.message, "error"); }
  };


  const inputStyle = { padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13, background: "var(--paper-strong)", width: "100%" };

  if (loading) return <div style={{ padding: 40, textAlign: "center", color: "var(--muted)" }}>加载中...</div>;

  // Build bot options for send dropdown
  const botOptions = [];
  if (group?.herald?.has_token) botOptions.push({ id: "herald", name: "🦉 主持人" });
  (group?.participants || []).forEach(p => {
    if (p.has_token) {
      const gw = gateways.find(g => g.id === p.id);
      botOptions.push({ id: p.id, name: `${gw?.emoji || "🤖"} ${p.name}` });
    }
  });

  // Gateways not yet registered as participants
  const registeredIds = new Set((group?.participants || []).map(p => p.id));
  const unregistered = gateways.filter(g => g.id !== "herald" && !registeredIds.has(g.id));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
