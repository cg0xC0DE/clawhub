          <div className="field" style={{ flex: "2 1 200px" }}>
            <label style={{ fontSize: 11, color: "var(--muted)" }}>Telegram 群组 ID</label>
            <input className="input" value={editGroupId} onChange={e => setEditGroupId(e.target.value)} style={{ fontSize: 13 }} placeholder="-100xxxxxxxxxx" />
          </div>
          <div className="field" style={{ flex: "0 0 100px" }}>
            <label style={{ fontSize: 11, color: "var(--muted)" }}>同步间隔 (秒)</label>
            <input className="input" type="number" min="5" value={editSyncInterval} onChange={e => setEditSyncInterval(e.target.value)} style={{ fontSize: 13 }} />
          </div>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, cursor: "pointer", paddingBottom: 6 }}>
            <input type="checkbox" checked={editSyncEnabled} onChange={e => setEditSyncEnabled(e.target.checked)} style={{ accentColor: "var(--accent)" }} />

          </label>
          <button className="btn btn-primary" onClick={saveGroupConfig} style={{ height: 36, whiteSpace: "nowrap" }}>保存</button>
        </div>
        {group?.herald && (
          <div style={{ marginTop: 8, fontSize: 12, color: "var(--muted)" }}>
            主持人: {group.herald.has_token ? "✅ Token 已配置" : "❌ 未配置 Token"} · 
            代理: {group?.proxy || "无"}
          </div>
        )}
      </div>

      {/* Participants */}
      <div className="panel">
        <div className="panel-title">👥 群组参与者</div>
        <div style={{ fontSize: 11, color: "var(--muted)", marginTop: -4, marginBottom: 4 }}>
          已注册的 Bot 可以用自己的身份往 Telegram 群发消息。名字自动同步当前人格卡。
        </div>

        {/* Registered participants */}
        {(group?.participants || []).length > 0 && (
          <div style={{ marginTop: 8, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 8 }}>
            {(group?.participants || []).map(p => {
              const gw = gateways.find(g => g.id === p.id);
              return (
                <div key={p.id} style={{
                  padding: "10px 12px", borderRadius: 10,
                  border: "1.5px solid var(--accent)", background: "rgba(209,137,45,0.06)",
                  display: "flex", alignItems: "center", gap: 8,
                }}>
                  <span style={{ fontSize: 18 }}>{gw?.emoji || "🤖"}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "var(--muted)" }}>
                      ✅ 已注册
                      {" · "}
                      {p.gateway_status === "running" ? "🟢 运行中" : p.gateway_status === "stopped" ? "⚪ 已停止" : "⚫ 无 Gateway"}
                    </div>

        )}

        {/* Unregistered gateways - one click to add */}
        {unregistered.length > 0 && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 6 }}>可注册的 Gateway（Token 从 openclaw.json 自动读取）：</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 8 }}>
              {unregistered.map(g => (
                <div key={g.id} style={{
                  padding: "10px 12px", borderRadius: 10,
                  border: "1.5px dashed var(--border)", background: "var(--paper-strong)",
                  display: "flex", alignItems: "center", gap: 8,
                }}>
                  <span style={{ fontSize: 18 }}>{g.emoji}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{g.name}</div>
                    <div style={{ fontSize: 11, color: "var(--muted)" }}>
                      {g.token_configured ? "🔑 Token 已配置" : "⚠️ 未配置 Token"}
                    </div>
                  </div>
                  <button className="btn btn-primary" onClick={() => registerParticipant(g.id)}
                    disabled={registering === g.id || !g.token_configured}
                    style={{ fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }}>
                    {registering === g.id ? "注册中..." : "+ 注册"}
                  </button>

              ))}

        {(group?.participants || []).length === 0 && unregistered.length === 0 && (
          <div style={{ color: "var(--muted)", fontSize: 13, padding: "12px 0" }}>没有可用的 Gateway，请先添加</div>
        )}

      {/* Send message */}
      <div className="panel">
        <div className="panel-title">📤 发送消息到群</div>
        {!group?.groupId ? (
          <div style={{ color: "var(--muted)", fontSize: 13, padding: "8px 0" }}>请先配置群组 ID</div>
        ) : botOptions.length === 0 ? (
          <div style={{ color: "var(--muted)", fontSize: 13, padding: "8px 0" }}>没有可用的 Bot（请先注册 Bot Token）</div>
        ) : (
          <div style={{ display: "flex", gap: 10, alignItems: "flex-end", marginTop: 8 }}>
            <div className="field" style={{ width: 160 }}>

              <select className="select" value={sendBot} onChange={e => setSendBot(e.target.value)} style={{ fontSize: 13 }}>

            <div className="field" style={{ flex: 1 }}>
              <label style={{ fontSize: 11, color: "var(--muted)" }}>消息内容</label>

            </div>
            <button className="btn btn-primary" onClick={sendMessage} disabled={sending} style={{ height: 36, whiteSpace: "nowrap" }}>
              {sending ? "发送中..." : "发送"}
            </button>
          </div>
        )}
      </div>

    </div>
  );
}

function ArenaPanel() {
  const [topic, setTopic] = useState("");
  const [nudgeMsg, setNudgeMsg] = useState("");
  const [acting, setActing] = useState(false);
  const [arenaTab, setArenaTab] = useState("main");
  const [allGateways, setAllGateways] = useState([]);
  const [gatewaysLoading, setGatewaysLoading] = useState(true);
  const [selectedParticipants, setSelectedParticipants] = useState(new Set());
  const [lastResult, setLastResult] = useState(null);
  const [rounds, setRounds] = useState(3);
  const [maxReplyLen, setMaxReplyLen] = useState(500);
  const [intervalSec, setIntervalSec] = useState(10);
  const [discussionRunning, setDiscussionRunning] = useState(false);
  const [arenaProgress, setArenaProgress] = useState({});
  const [summary, setSummary] = useState(null);
  const [availableMaterials, setAvailableMaterials] = useState([]);
  const [selectedKnowledge, setSelectedKnowledge] = useState(new Set());
  const [selectedTargets, setSelectedTargets] = useState(new Set());
  const [focusMap, setFocusMap] = useState({});
  const [personaMap, setPersonaMap] = useState({});
  const [allPersonas, setAllPersonas] = useState([]);
  const [heraldPrompt, setHeraldPrompt] = useState("");
  const [templates, setTemplates] = useState([]);
  const [tplName, setTplName] = useState("");
  const [showTplSave, setShowTplSave] = useState(false);
  const [loadingTpl, setLoadingTpl] = useState(null);
  const [autoEndCountdown, setAutoEndCountdown] = useState(0); // seconds remaining
  const prevRunningRef = useRef(false);
  const autoEndTimerRef = useRef(null);

  const pollStatus = useCallback(async () => {
    try {
      const s = await api("GET", "/api/arena/status");
      setDiscussionRunning(s.running);
      setArenaProgress(s);
      if (s.summary && !s.running) setSummary(s.summary);
    } catch (e) {}
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const [gws, matData, personaData, tplData] = await Promise.all([
          api("GET", "/api/gateways"),
          api("GET", "/api/materials"),
          api("GET", "/api/personas"),
          api("GET", "/api/arena/templates"),
        ]);
        setAllGateways(gws);
        const withToken = gws.filter(g => g.role !== "herald" && g.token_configured).map(g => g.id);
        setSelectedParticipants(new Set(withToken));
        setAvailableMaterials(matData.materials || []);
        setAllPersonas(personaData.personas || []);
        setTemplates(tplData.templates || []);
      } catch (e) {}
      setGatewaysLoading(false);
    })();
    pollStatus();
    const iv = setInterval(pollStatus, 5000);
    return () => clearInterval(iv);
  }, [pollStatus]);

  // Auto-end: detect when discussion finishes all rounds (running: true → false)
  useEffect(() => {
    if (prevRunningRef.current && !discussionRunning && arenaProgress.current_round > 0) {
      // Discussion just completed naturally — start 30s countdown
      setAutoEndCountdown(30);
    }
    prevRunningRef.current = discussionRunning;
    // If discussion starts again, cancel any pending countdown
    if (discussionRunning) {
      setAutoEndCountdown(0);
      if (autoEndTimerRef.current) { clearInterval(autoEndTimerRef.current); autoEndTimerRef.current = null; }
    }
  }, [discussionRunning, arenaProgress.current_round]);

  // Countdown ticker + auto-end trigger
  useEffect(() => {
    if (autoEndCountdown <= 0) {
      if (autoEndTimerRef.current) { clearInterval(autoEndTimerRef.current); autoEndTimerRef.current = null; }
      return;
    }
    autoEndTimerRef.current = setInterval(() => {
      setAutoEndCountdown(prev => {
        if (prev <= 1) {
          clearInterval(autoEndTimerRef.current);
          autoEndTimerRef.current = null;
          // Auto-end: trigger secretary if prompt exists
          (async () => {
            try {
              await api("POST", "/api/arena/end", { clear_logs: false });
              const hasPrompt = heraldPrompt.trim();
              if (hasPrompt) {
                toast("讨论已自动结束，书记正在整理...", "success");
                try { localStorage.setItem("secretary_last_prompt", hasPrompt); } catch {}
                try {
                  const modelData = await api("GET", "/api/arena/secretary/models");
                  const firstModel = modelData.models?.[0]?.key;
                  if (firstModel) {
                    try {
                      const prev = JSON.parse(localStorage.getItem("secretary_prompt_history") || "[]");
                      const next = [{ text: hasPrompt, model: firstModel, time: new Date().toLocaleString() },
                        ...prev.filter(h => h.text !== hasPrompt)].slice(0, 20);
                      localStorage.setItem("secretary_prompt_history", JSON.stringify(next));
                    } catch {}
                    await api("POST", "/api/arena/secretary/generate", {
                      model: firstModel, prompt: hasPrompt, include_log: true,
                    });
                  }
                } catch (e) { console.error("Secretary auto-generate failed:", e); }
                setArenaTab("secretary");
              } else {
                toast("讨论已自动结束", "success");
              }
            } catch (e) { console.error("Auto-end failed:", e); }
          })();
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => { if (autoEndTimerRef.current) { clearInterval(autoEndTimerRef.current); autoEndTimerRef.current = null; } };
  }, [autoEndCountdown > 0]);  // only re-run when transitioning to/from counting

  const cancelAutoEnd = () => {

  const toggleParticipant = (id) => {

      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const toggleKnowledge = (id) => {
    setSelectedKnowledge(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const toggleTarget = (id) => {
    setSelectedTargets(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const handleStart = async () => {
    if (!topic.trim()) { toast("请输入讨论议题", "error"); return; }
    if (selectedParticipants.size === 0) { toast("请至少选择一位参与者", "error"); return; }
    setActing(true);
    try {
      const body = {
        topic: topic.trim(),
        participant_ids: Array.from(selectedParticipants),
        knowledge_ids: Array.from(selectedKnowledge),
        target_ids: Array.from(selectedTargets),
        focus_map: Object.fromEntries(Object.entries(focusMap).filter(([k,v]) => selectedParticipants.has(k) && v.trim())),
        herald_prompt: heraldPrompt.trim() || "",
        rounds: parseInt(rounds) || 3,
        maxReplyLength: parseInt(maxReplyLen) || 500,
        intervalSeconds: parseInt(intervalSec) || 10,
      };
      const result = await api("POST", "/api/arena/start", body);
      setLastResult(result);
      setDiscussionRunning(true);
      toast(`讨论已发起，${(result.participants || []).length} 位专家×${result.rounds}轮`, "success");
    } catch (e) {
      toast(e.message, "error");
    }
    setActing(false);
  };

  const handleNudge = async () => {
    setActing(true);
    try {
      const body = nudgeMsg.trim() ? { message: nudgeMsg.trim() } : {};
      const result = await api("POST", "/api/arena/nudge", body);
      const nudged = (result.results || []).filter(r => r.status === "nudged").length;
      toast(`已推动 ${nudged} 位专家继续讨论`, "success");
      setNudgeMsg("");
    } catch (e) {
      toast(e.message, "error");
    }
    setActing(false);
  };

  const handleEnd = async (clearLogs) => {
    const hasPrompt = heraldPrompt.trim();
    if (!confirm(clearLogs ? "结束讨论并清空聊天记录？" : hasPrompt ? "结束讨论？书记将自动开始整理总结。" : "结束讨论？")) return;
    setActing(true);
    try {
      const result = await api("POST", "/api/arena/end", { clear_logs: clearLogs });
      setDiscussionRunning(false);
      setLastResult(null);
      if (clearLogs) { setTopic(""); toast("讨论已结束，记录已清空", "success"); }
      else if (hasPrompt) {
        // Auto-trigger secretary generation with pre-entered prompt
        toast("讨论已结束，书记正在整理...", "success");
        try { localStorage.setItem("secretary_last_prompt", hasPrompt); } catch {}
        // Fetch models and auto-generate
        try {
          const modelData = await api("GET", "/api/arena/secretary/models");
          const firstModel = modelData.models?.[0]?.key;
          if (firstModel) {
            // Save to prompt history
            try {
              const prev = JSON.parse(localStorage.getItem("secretary_prompt_history") || "[]");
              const next = [{ text: hasPrompt, model: firstModel, time: new Date().toLocaleString() },
                ...prev.filter(h => h.text !== hasPrompt)].slice(0, 20);
              localStorage.setItem("secretary_prompt_history", JSON.stringify(next));
            } catch {}
            await api("POST", "/api/arena/secretary/generate", {
              model: firstModel, prompt: hasPrompt, include_log: true,
            });
          }
        } catch (e) { console.error("Secretary auto-generate failed:", e); }
        setArenaTab("secretary");
      } else {
        toast("讨论已结束", "success");
      }
    } catch (e) {
      toast(e.message, "error");
    }
    setActing(false);
  };

  const handleSaveTemplate = async () => {
    if (!tplName.trim()) { toast("请输入模板名称", "error"); return; }
    const slots = allGateways
      .filter(gw => gw.role !== "herald" && selectedParticipants.has(gw.id))
      .map(gw => ({
        gateway_id: gw.id,
        persona_id: personaMap[gw.id] || "",
        focus: focusMap[gw.id] || "",

    if (!slots.length) { toast("请至少选择一位专家", "error"); return; }
    try {
      const result = await api("POST", "/api/arena/templates", {
        name: tplName.trim(),
        slots,
        topic: topic,
        herald_prompt: heraldPrompt,
        rounds: parseInt(rounds) || 3,
        maxReplyLength: parseInt(maxReplyLen) || 500,
        intervalSeconds: parseInt(intervalSec) || 10,
        knowledge_ids: Array.from(selectedKnowledge),
        target_ids: Array.from(selectedTargets),

      toast(`模板「${tplName.trim()}」已保存`, "success");
      setTemplates(prev => [result.template, ...prev]);
      setTplName("");
      setShowTplSave(false);
    } catch (e) { toast(e.message, "error"); }
  };

  const handleLoadTemplate = async (tpl) => {

    setLoadingTpl(tpl.id);
    try {

      // Restore form state
      setTopic(t.topic || "");
      setHeraldPrompt(t.herald_prompt || "");

      setMaxReplyLen(t.maxReplyLength || 500);
      setIntervalSec(t.intervalSeconds || 10);

        if (slot.persona_id) newPersona[slot.gateway_id] = slot.persona_id;

            <textarea

                  </select>
                  <input
                    value={focusMap[gw.id] || ""}

                    style={{
                      flex: 1, padding: "4px 8px", borderRadius: 6,

        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <div className="field" style={{ width: 80 }}>
            <label style={{ fontSize: 11, color: "var(--muted)" }}>轮数</label>
            <input className="input" type="number" min="1" max="20" value={rounds} onChange={e => setRounds(e.target.value)} style={{ fontSize: 13 }} />
          </div>
          <div className="field" style={{ width: 100 }}>
            <label style={{ fontSize: 11, color: "var(--muted)" }}>字数上限</label>
            <input className="input" type="number" min="100" max="5000" step="100" value={maxReplyLen} onChange={e => setMaxReplyLen(e.target.value)} style={{ fontSize: 13 }} />
          </div>
          <div className="field" style={{ width: 90 }}>
            <label style={{ fontSize: 11, color: "var(--muted)" }}>间隔(秒)</label>
            <input className="input" type="number" min="0" max="120" step="5" value={intervalSec} onChange={e => setIntervalSec(e.target.value)} style={{ fontSize: 13 }} />
          </div>
          <button className="btn btn-primary" onClick={handleStart} disabled={acting || discussionRunning || !topic.trim() || selectedParticipants.size === 0}
            style={{ marginTop: 14 }}>
            {acting ? "发起中..." : discussionRunning ? "讨论进行中..." : `▶ 发起讨论（${selectedParticipants.size} 位×${rounds}轮）`}
          </button>
          {discussionRunning && (
            <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ display: "inline-block", width: 14, height: 14, border: "2.5px solid var(--border)", borderTopColor: "var(--accent)", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
              <span style={{ fontSize: 12, color: "var(--accent)", fontWeight: 600 }}>
                讨论进行中{arenaProgress.current_round ? ` — 第 ${arenaProgress.current_round}/${arenaProgress.rounds || "?"} 轮` : ""}
                {arenaProgress.message_count ? `，${arenaProgress.message_count} 条发言` : ""}
              </span>
            </div>
          )}
        </div>
      </div>

      {/* Nudge + End panel */}
      <div style={{ marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid var(--border)" }}>
        <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>💬 推动讨论</div>
        <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 10 }}>
          向所有运行中的专家发送新一轮心跳，让他们继续回应最新进展。可选附加一条消息引导方向。
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
          <input
            value={nudgeMsg}
            onChange={e => setNudgeMsg(e.target.value)}
            placeholder="（可选）引导消息，如：'请从经济角度补充观点'"
            style={{ ...inputStyle, flex: 1 }}
            onKeyDown={e => { if (e.key === "Enter") handleNudge(); }}
          />
          <button className="btn btn-primary" onClick={handleNudge} disabled={acting} style={{ whiteSpace: "nowrap" }}>
            {acting ? "推动中..." : "⚡ Nudge"}
          </button>
        </div>

        {/* Auto-end countdown bar */}
        {autoEndCountdown > 0 && (
          <div style={{
            marginTop: 12, padding: "10px 14px", borderRadius: 8,
            background: "linear-gradient(90deg, rgba(46,204,113,.12), rgba(243,156,18,.12))",
            border: "1px solid rgba(46,204,113,.3)",
            display: "flex", alignItems: "center", gap: 10,
          }}>
            <div style={{
              width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
              background: "rgba(46,204,113,.15)", fontSize: 14, fontWeight: 700, color: "#27ae60",
            }}>{autoEndCountdown}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 600 }}>讨论轮次已完成，{autoEndCountdown}s 后自动结束{heraldPrompt.trim() ? "并整理总结" : ""}</div>
              <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 1 }}>点击下方按钮立即结束，或取消自动结束继续讨论</div>
            </div>
            <button className="btn btn-ghost" onClick={cancelAutoEnd}
              style={{ fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }}>✕ 取消倒计时</button>
          </div>
        )}

        <div style={{ marginTop: 16, paddingTop: 12, borderTop: "1px solid var(--border)", display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{ flex: 1, fontSize: 12, color: "var(--muted)" }}>
            结束讨论。若已填写书记提示词，将自动整理总结。可选同时清空记录。
          </div>
          <button className="btn btn-ghost" onClick={() => { cancelAutoEnd(); handleEnd(false); }} disabled={acting}
            style={{ whiteSpace: "nowrap", fontSize: 12 }}>
            ⏹ 结束讨论
          </button>
          <button className="btn btn-ghost" onClick={() => { cancelAutoEnd(); handleEnd(true); }} disabled={acting}
            style={{ whiteSpace: "nowrap", fontSize: 12, color: "var(--bad, #c0392b)" }}>
            ⏹ 结束并清空
          </button>
        </div>
      </div>

      {/* Last result */}
      {lastResult && (
        <div style={{ marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid var(--border)" }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>📋 最近操作结果</div>
          <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>
            议题: {lastResult.topic || "—"}
          </div>
          <div style={{ fontSize: 12 }}>
            主持人: <span style={{ color: lastResult.herald_announced ? "#2ecc71" : "var(--muted)" }}>
              {lastResult.herald_announced ? "✓ 已公告" : "未启动"}
            </span>
            {" · "}参与专家: {(lastResult.participants || []).length} 位
            {" · "}轮数: {lastResult.rounds || "—"}
          </div>
        </div>
      )}

      {/* Summary report */}
      {summary && (
        <div style={{ marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid var(--border)" }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>📊 主持人总结报告</div>
          <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>
            议题: {arenaProgress.topic || "—"} · {arenaProgress.expert_count || 0} 位专家 · {arenaProgress.rounds || 0} 轮 · {arenaProgress.message_count || 0} 条发言
          </div>
          <div style={{
            fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-wrap",
            padding: "12px 16px", borderRadius: 10,
            background: "var(--paper-strong)", border: "1px solid var(--border)",
            maxHeight: 500, overflowY: "auto",
          }}>
            {summary}
          </div>
          <div style={{ marginTop: 8, display: "flex", gap: 8 }}>
            <button className="btn btn-ghost" style={{ fontSize: 11 }} onClick={() => {
              navigator.clipboard.writeText(summary);
              toast("已复制到剪贴板", "success");
            }}>📋 复制</button>
            <button className="btn btn-ghost" style={{ fontSize: 11 }} onClick={() => setSummary(null)}>✕ 关闭</button>
          </div>
        </div>
      )}

      </>}
    </div>
  );
}


// ── Materials Panel (素材库) ──────────────────────────────────
function MaterialsPanel() {
  const [materials, setMaterials] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [viewingId, setViewingId] = useState(null);
  const [viewContent, setViewContent] = useState("");
  const [pasteMode, setPasteMode] = useState(false);
  const [pasteContent, setPasteContent] = useState("");
  const [pasteName, setPasteName] = useState("");
  const [filterType, setFilterType] = useState("all");
  const fileInputRef = useRef(null);

  const loadMaterials = useCallback(async () => {
    try {
      const data = await api("GET", "/api/materials");
      setMaterials(data.materials || []);
    } catch (e) {}
    setLoading(false);
  }, []);

  useEffect(() => { loadMaterials(); }, [loadMaterials]);

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const form = new FormData();
      form.append("file", file);
      form.append("type", filterType === "all" ? "knowledge" : filterType);
      const resp = await fetch("/api/materials", { method: "POST", body: form });
      const data = await resp.json();
      if (data.ok) {
        toast(`已上传: ${file.name}`, "success");
        loadMaterials();
      } else {
        toast(data.error || "上传失败", "error");
      }
    } catch (e) { toast(e.message, "error"); }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const handlePasteSubmit = async () => {
    if (!pasteContent.trim()) { toast("内容不能为空", "error"); return; }
    setUploading(true);
    try {
      await api("POST", "/api/materials", {
        content: pasteContent,
        filename: pasteName.trim() || "粘贴内容.md",
        type: filterType === "all" ? "knowledge" : filterType,
      });
      toast("已保存", "success");
      setPasteMode(false);
      setPasteContent("");
      setPasteName("");
      loadMaterials();
    } catch (e) { toast(e.message, "error"); }
    setUploading(false);
  };

  const handleToggleType = async (id, currentType) => {
    const newType = currentType === "knowledge" ? "target" : "knowledge";
    try {
      await api("PUT", `/api/materials/${id}/type`, { type: newType });
      loadMaterials();
    } catch (e) { toast(e.message, "error"); }
  };

  const handleDelete = async (id, name) => {
    if (!confirm(`确定删除「${name}」？`)) return;
    try {
      await api("DELETE", `/api/materials/${id}`);
      toast("已删除", "info");
      if (viewingId === id) { setViewingId(null); setViewContent(""); }
      loadMaterials();
    } catch (e) { toast(e.message, "error"); }
  };

  const handleView = async (id) => {
    if (viewingId === id) { setViewingId(null); return; }
    try {
      const data = await api("GET", `/api/materials/${id}`);
      setViewContent(data.content || "");
      setViewingId(id);
    } catch (e) { toast(e.message, "error"); }
  };

  const formatSize = (bytes) => {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
  };

  if (loading) return <div className="loading">加载中...</div>;

  return (
    <div style={{ padding: "20px 24px", height: "100%", overflowY: "auto" }}>
      <div className="section-title">📂 素材库</div>
      <div className="section-sub">上传文章草稿、参考资料等素材，可在 Arena 讨论时作为讨论标的</div>

      {/* Upload area */}
      <div style={{ marginTop: 20, marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <input ref={fileInputRef} type="file" accept=".md,.txt,.json,.csv,.html,.xml,.yaml,.yml,.py,.js,.ts,.jsx,.tsx"
            onChange={handleUpload} style={{ display: "none" }} id="mat-upload" />
          <button className="btn btn-primary" onClick={() => fileInputRef.current?.click()} disabled={uploading}>
            {uploading ? "上传中..." : "📄 上传文件"}
          </button>
          <button className="btn btn-ghost" onClick={() => setPasteMode(!pasteMode)}>
            ✏️ 粘贴内容
          </button>
          <span style={{ fontSize: 11, color: "var(--muted)" }}>
            {filterType === "target" ? "上传后自动标记为讨论标的" : filterType === "knowledge" ? "上传后自动标记为知识" : "上传后默认为知识"}
          </span>
        </div>

        {pasteMode && (
          <div style={{
            marginTop: 12, padding: 14, borderRadius: 12,
            background: "var(--paper-strong)", border: "1px solid var(--border)",
          }}>
            <input placeholder="文件名（如：我的文章草稿.md）" value={pasteName}
              onChange={e => setPasteName(e.target.value)}
              style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13, marginBottom: 8 }} />
            <textarea placeholder="在此粘贴文章内容..." value={pasteContent}
              onChange={e => setPasteContent(e.target.value)}
              rows={8}
              style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13, fontFamily: "JetBrains Mono, monospace", resize: "vertical" }} />
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button className="btn btn-primary" onClick={handlePasteSubmit} disabled={uploading || !pasteContent.trim()}>
                保存
              </button>
              <button className="btn btn-ghost" onClick={() => { setPasteMode(false); setPasteContent(""); setPasteName(""); }}>
                取消
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Filter tabs + Materials list */}
      {materials.length > 0 && (
        <div style={{
          display: "flex", gap: 0, marginBottom: 12,
          borderBottom: "2px solid var(--border)",
        }}>
          {[
            { key: "all", label: "全部", count: materials.length },
            { key: "knowledge", label: "📚 知识", count: materials.filter(m => (m.type || "knowledge") === "knowledge").length },
            { key: "target", label: "📌 讨论标的", count: materials.filter(m => (m.type || "knowledge") === "target").length },
          ].map(tab => (
            <button key={tab.key} onClick={() => setFilterType(tab.key)} style={{
              padding: "6px 16px", fontSize: 12, fontWeight: filterType === tab.key ? 700 : 400,
              border: "none", cursor: "pointer", background: "transparent",
              borderBottom: filterType === tab.key ? "2px solid var(--accent)" : "2px solid transparent",
              color: filterType === tab.key ? "var(--accent)" : "var(--ink-soft)",
              marginBottom: -2,
            }}>{tab.label} ({tab.count})</button>
          ))}
        </div>
      )}

      {materials.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px 0", color: "var(--muted)" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📂</div>
          <div style={{ fontSize: 13 }}>暂无素材，上传文件或粘贴内容开始</div>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {materials.filter(m => filterType === "all" || (m.type || "knowledge") === filterType).map(m => (
            <div key={m.id} style={{
              background: "#fff", border: "1px solid var(--border)", borderRadius: 12,
              padding: "12px 16px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 20 }}>
                  {(m.type || "knowledge") === "target" ? "📌" : "📚"}
                </span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {m.filename}
                    </span>
                    <button onClick={() => handleToggleType(m.id, m.type || "knowledge")}
                      style={{
                        fontSize: 10, padding: "1px 6px", borderRadius: 6, cursor: "pointer",
                        border: "1px solid transparent",
                        background: (m.type || "knowledge") === "target" ? "rgba(209,137,45,0.12)" : "rgba(91,140,229,0.12)",
                        color: (m.type || "knowledge") === "target" ? "var(--accent)" : "#5b8ce5",
                        fontWeight: 600,
                      }}>
                      {(m.type || "knowledge") === "target" ? "讨论标的" : "知识"}
                    </button>
                  </div>
                  <div style={{ fontSize: 11, color: "var(--muted)" }}>
                    {formatSize(m.size)} · {m.lines} 行 · {m.uploaded_at}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 8px" }}
                    onClick={() => handleView(m.id)}>
                    {viewingId === m.id ? "收起" : "查看"}
                  </button>
                  <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 8px", color: "var(--bad)" }}
                    onClick={() => handleDelete(m.id, m.filename)}>
                    删除
                  </button>
                </div>
              </div>

              {/* Tags */}
              {m.tags && m.tags.length > 0 && (
                <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
                  {m.tags.map(t => (
                    <span key={t} style={{
                      fontSize: 10, padding: "2px 6px", borderRadius: 6,
                      background: "rgba(209,137,45,0.10)", color: "var(--ink-soft)",
                    }}>{t}</span>
                  ))}
                </div>
              )}

              {/* Content preview */}
              {viewingId === m.id && (
                <div style={{
                  marginTop: 10, padding: "10px 12px", borderRadius: 8,
                  background: "var(--paper-strong)", border: "1px solid var(--border)",
                  fontSize: 12, fontFamily: "JetBrains Mono, monospace",
                  whiteSpace: "pre-wrap", maxHeight: 400, overflowY: "auto",
                  lineHeight: 1.6,
                }}>
                  {viewContent || "(空)"}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ── Persona Library Panel (角色库) ─────────────────────────────
function PersonaLibraryPanel({ gateways: allGateways }) {
  const [personas, setPersonas] = useState([]);
  const [gateways, setGateways] = useState([]);
  const [loading, setLoading] = useState(true);
  const [viewingId, setViewingId] = useState(null);
  const [viewFiles, setViewFiles] = useState({});
  const [applyingId, setApplyingId] = useState(null);
  const [applyTarget, setApplyTarget] = useState("");
  // Generation
  const [models, setModels] = useState([]);
  const [genModel, setGenModel] = useState("gpt-5.4");
  const [genName, setGenName] = useState("");
  const [genTasks, setGenTasks] = useState([]);

  const loadPersonas = useCallback(async () => {
    try {
      const [pData, gwData] = await Promise.all([
        api("GET", "/api/personas"),
        api("GET", "/api/gateways"),
      ]);
      setPersonas(pData.personas || []);
      setGateways(gwData.filter(g => g.role !== "herald"));
    } catch (e) {}
    setLoading(false);
  }, []);

  useEffect(() => {
    loadPersonas();
    api("GET", "/api/persona-models").then(m => {
      setModels(m);
      if (m.length && !m.find(x => x.key === genModel)) setGenModel(m[0].key);
    }).catch(() => {});
  }, [loadPersonas]);

  // Poll generation tasks
  useEffect(() => {
    let active = true;
    const poll = async () => {
      try {
        const data = await api("GET", "/api/personas/generate/status");
        if (!active) return;
        const tasks = data.tasks || [];
        setGenTasks(tasks);
        // If any task just completed, refresh persona list
        const hasDone = tasks.some(t => t.status === "done");
        if (hasDone) loadPersonas();
      } catch (e) {}
    };
    poll();
    const iv = setInterval(poll, 3000);
    return () => { active = false; clearInterval(iv); };
  }, [loadPersonas]);

  const handleGenerate = async () => {
    const name = genName.trim();
    if (!name) { toast("请输入角色名", "error"); return; }
    try {
      await api("POST", "/api/personas/generate", { character_name: name, model: genModel });
      toast(`已开始生成「${name}」`, "success");
      setGenName("");
    } catch (e) { toast(e.message, "error"); }
  };

  const handleView = async (id) => {
    if (viewingId === id) { setViewingId(null); return; }
    try {
      const data = await api("GET", `/api/personas/${id}`);
      setViewFiles(data.contents || {});
      setViewingId(id);
    } catch (e) { toast(e.message, "error"); }
  };

  const handleDelete = async (id, name) => {
    if (!confirm(`确定删除角色「${name}」？`)) return;
    try {
      await api("DELETE", `/api/personas/${id}`);
      toast("已删除", "info");
      if (viewingId === id) { setViewingId(null); setViewFiles({}); }
      loadPersonas();
    } catch (e) { toast(e.message, "error"); }
  };

  const handleApply = async (personaId) => {
    if (!applyTarget) { toast("请选择目标 Gateway", "error"); return; }
    try {
      const result = await api("POST", `/api/personas/${personaId}/apply`, {
        gateway_id: applyTarget,
      });
      toast(`已将「${result.persona_name}」应用到 ${applyTarget}（${result.applied_files.length} 个文件）`, "success");
      setApplyingId(null);
      setApplyTarget("");
    } catch (e) { toast(e.message, "error"); }
  };

  if (loading) return <div className="loading">加载中...</div>;

  return (
    <div style={{ padding: "20px 24px", height: "100%", overflowY: "auto" }}>
      <div className="section-title">🎭 角色库</div>
      <div className="section-sub">生成和管理角色人格（SOUL.md 三件套），可一键应用到任意 Gateway</div>

      {/* Generation bar */}
      <div className="panel" style={{ marginTop: 16, marginBottom: 16, padding: "12px 16px" }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 8 }}>✨ 生成新角色</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <input
            value={genName}
            onChange={e => setGenName(e.target.value)}
            placeholder="输入角色名，如：奥格威、马斯克、孙子…"
            onKeyDown={e => { if (e.key === "Enter") handleGenerate(); }}
            style={{ flex: "1 1 180px", padding: "6px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13 }}
          />
          <select value={genModel} onChange={e => setGenModel(e.target.value)}
            style={{ padding: "6px 8px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 12 }}>
            {models.map(m => <option key={m.key} value={m.key}>{m.label}</option>)}
          </select>
          <button className="btn btn-primary" onClick={handleGenerate} style={{ whiteSpace: "nowrap", fontSize: 12 }}>
            🎭 生成
          </button>
        </div>
        <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 6 }}>
          可连续输入多个角色名，每个独立生成，无需等待上一个完成
        </div>

        {/* Active generation tasks */}
        {genTasks.length > 0 && (
          <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
            {genTasks.map(t => (
              <div key={t.task_id} style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "6px 10px", borderRadius: 8, fontSize: 12,
                background: t.status === "generating" ? "rgba(209,137,45,0.06)"
                           : t.status === "done" ? "rgba(26,143,124,0.06)"
                           : "rgba(200,60,60,0.06)",
                border: `1px solid ${t.status === "generating" ? "var(--accent)" : t.status === "done" ? "var(--good, #1a8f7c)" : "var(--bad, #c0392b)"}`,
              }}>
                {t.status === "generating" && (

                <span style={{ fontWeight: 600 }}>{t.character_name}</span>
                <span style={{ color: "var(--muted)", fontSize: 10 }}>({t.model})</span>
                <span style={{ flex: 1 }}>{t.message || t.error || ""}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {personas.length === 0 ? (
        <div style={{
          textAlign: "center", padding: 40, color: "var(--muted)",
          background: "var(--paper-strong)", borderRadius: 16, marginTop: 20,

          <div style={{ fontSize: 40, marginBottom: 12 }}>🎭</div>
          <div style={{ fontSize: 14 }}>角色库为空</div>
          <div style={{ fontSize: 12, marginTop: 6 }}>
            生成角色时会自动存入角色库，也可从 Gateway 详情页手动保存
          </div>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
          {personas.map(p => (
            <div key={p.id} style={{
              background: "#fff", border: "1px solid var(--border)", borderRadius: 12,
              padding: "12px 16px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 28 }}>{p.emoji || "🪭"}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 15, fontWeight: 700 }}>{p.name}</span>
                    <span style={{
                      fontSize: 10, padding: "1px 6px", borderRadius: 6,
                      background: "rgba(91,140,229,0.1)", color: "#5b8ce5",
                    }}>{p.model || "?"}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "var(--muted)" }}>
                    {(p.files || []).length} 个文件 · 来自 {p.source_gateway || "?"} · {p.saved_at}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 8px" }}
                    onClick={() => handleView(p.id)}>
                    {viewingId === p.id ? "收起" : "查看"}
                  </button>
                  <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 8px" }}
                    onClick={() => { setApplyingId(applyingId === p.id ? null : p.id); setApplyTarget(""); }}>
                    🔄 应用
                  </button>
                  <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 8px", color: "#e74c3c" }}
                    onClick={() => handleDelete(p.id, p.name)}>
                    删除
                  </button>
                </div>
              </div>

              {/* Apply panel */}
              {applyingId === p.id && (
                <div style={{
                  marginTop: 10, padding: 10, borderRadius: 8,
                  background: "rgba(209,137,45,0.06)", border: "1px solid var(--border)",
                  display: "flex", alignItems: "center", gap: 10,
                }}>
                  <span style={{ fontSize: 12, whiteSpace: "nowrap" }}>应用到：</span>
                  <select value={applyTarget} onChange={e => setApplyTarget(e.target.value)}
                    style={{ flex: 1, padding: "4px 8px", borderRadius: 6, border: "1px solid var(--border)", fontSize: 12 }}>
                    <option value="">选择 Gateway...</option>
                    {gateways.map(gw => (
                      <option key={gw.id} value={gw.id}>{gw.emoji || "🪭"} {gw.name} ({gw.id})</option>
                    ))}
                  </select>
                  <button className="btn btn-primary" style={{ fontSize: 11, padding: "4px 12px" }}
                    onClick={() => handleApply(p.id)}>
                    确认应用
                  </button>
                  <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 8px" }}
                    onClick={() => setApplyingId(null)}>
                    取消
                  </button>
                </div>
              )}

              {/* Preview files */}
              {viewingId === p.id && (
                <div style={{ marginTop: 10 }}>
                  {Object.entries(viewFiles).map(([fn, content]) => (
                    <div key={fn} style={{ marginBottom: 8 }}>
                      <div style={{
                        fontSize: 11, fontWeight: 700, color: "var(--accent)",
                        padding: "4px 8px", background: "rgba(209,137,45,0.06)",
                        borderRadius: "6px 6px 0 0",
                      }}>{fn}</div>
                      <pre style={{
                        fontSize: 11, padding: 10, background: "#fafafa",
                        border: "1px solid var(--border)", borderRadius: "0 0 6px 6px",
                        maxHeight: 200, overflow: "auto", whiteSpace: "pre-wrap",
                        margin: 0,
                      }}>{content.slice(0, 1500)}{content.length > 1500 ? "\n\n... (已截断)" : ""}</pre>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ── Fuzzy Model Picker (openclaw catalog) ────────────────────
function FuzzyModelPicker({ selected, onSelect, onProviderDetected }) {
  const [catalog, setCatalog] = useState([]);       // [{provider, model, full}]
  const [loading, setLoading] = useState(true);
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const data = await api("GET", "/api/openclaw-models");
        const items = (data.models || []).map(full => {
          const idx = full.indexOf("/");
          return idx > 0
            ? { provider: full.slice(0, idx), model: full.slice(idx + 1), full }
            : { provider: "unknown", model: full, full };
        });
        items.sort((a, b) => a.provider.localeCompare(b.provider) || a.model.localeCompare(b.model));
        setCatalog(items);
      } catch (e) { console.error(e); }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const q = query.toLowerCase();
  const filtered = q
    ? catalog.filter(m => m.full.toLowerCase().includes(q) || m.model.toLowerCase().includes(q) || m.provider.toLowerCase().includes(q))
    : catalog;

  // Group by provider
  const grouped = {};
  for (const m of filtered) {
    (grouped[m.provider] = grouped[m.provider] || []).push(m);
  }

  const toggle = (item) => {
    const exists = selected.find(s => s.full === item.full);
    let next;
    if (exists) {
      next = selected.filter(s => s.full !== item.full);
    } else {
      next = [...selected, item];
    }
    onSelect(next);
    // Auto-detect provider from first selection
    if (next.length > 0 && onProviderDetected) {
      const prov = next[0].provider;
      const allSameProv = next.every(s => s.provider === prov);
      if (allSameProv) onProviderDetected(prov);
    }
  };

  const isSelected = (full) => selected.some(s => s.full === full);

  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <div style={{
        display: "flex", flexWrap: "wrap", gap: 4, padding: "6px 10px", minHeight: 38,
        border: "1px solid var(--border)", borderRadius: 8, background: "#fff",
        cursor: "text", alignItems: "center",
      }} onClick={() => setOpen(true)}>
        {selected.map(s => (
          <span key={s.full} style={{
            fontSize: 11, padding: "2px 8px", borderRadius: 6,
            background: "rgba(31,157,99,0.12)", color: "var(--ok)", fontWeight: 600,
            display: "flex", alignItems: "center", gap: 4,
          }}>
            {s.full}
            <span style={{ cursor: "pointer", fontSize: 13, lineHeight: 1 }}
              onClick={(e) => { e.stopPropagation(); toggle(s); }}>×</span>
          </span>
        ))}
        <input
          value={query} onChange={e => { setQuery(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          placeholder={selected.length ? "" : loading ? "加载 openclaw 模型列表..." : "搜索模型 (如 claude, gpt, gemini...)"}
          style={{
            border: "none", outline: "none", flex: 1, minWidth: 120,
            fontSize: 13, padding: "2px 0", background: "transparent",
          }}
        />
      </div>
      {open && !loading && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 999,
          maxHeight: 320, overflowY: "auto", marginTop: 4,
          background: "#fff", border: "1px solid var(--border)", borderRadius: 10,
          boxShadow: "0 8px 24px rgba(0,0,0,0.12)",
        }}>
          {Object.keys(grouped).length === 0 && (
            <div style={{ padding: "12px 16px", fontSize: 13, color: "var(--muted)" }}>
              {q ? `没有匹配 "${q}" 的模型` : "暂无模型"}
            </div>
          )}
          {Object.entries(grouped).map(([prov, models]) => (
            <div key={prov}>
              <div style={{
                fontSize: 11, fontWeight: 700, color: "var(--muted)", padding: "8px 14px 4px",
                textTransform: "uppercase", letterSpacing: 0.5,
                background: "rgba(0,0,0,0.02)", position: "sticky", top: 0,
              }}>{prov} ({models.length})</div>
              {models.map(m => {
                const sel = isSelected(m.full);
                return (
                  <div key={m.full} onClick={() => toggle(m)} style={{
                    padding: "6px 14px", fontSize: 13, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 8,
                    background: sel ? "rgba(31,157,99,0.06)" : "transparent",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = sel ? "rgba(31,157,99,0.10)" : "rgba(0,0,0,0.03)"}
                    onMouseLeave={e => e.currentTarget.style.background = sel ? "rgba(31,157,99,0.06)" : "transparent"}>
                    <span style={{
                      width: 16, height: 16, borderRadius: 4, flexShrink: 0,
                      border: sel ? "none" : "1.5px solid var(--border)",
                      background: sel ? "var(--ok)" : "#fff",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      color: "#fff", fontSize: 11, fontWeight: 700,
                    }}>{sel ? "✓" : ""}</span>
                    <span style={{ fontFamily: "JetBrains Mono", fontSize: 12 }}>{m.model}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ── LLM Management Panel ──────────────────────────────────────
function LLMPanel({ gateways }) {
  const [providers, setProviders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editingKey, setEditingKey] = useState(null); // provider id being edited
  const [keyInput, setKeyInput] = useState("");
  const [showAddProvider, setShowAddProvider] = useState(false);
  const [newProv, setNewProv] = useState({ id: "", label: "", base_url: "", api_format: "" });
  const [pickedModels, setPickedModels] = useState([]);  // [{provider, model, full}]
  const [gwModels, setGwModels] = useState({}); // gw_id -> {primary, fallbacks}
  const [assigningModel, setAssigningModel] = useState(null); // gw_id being assigned
  const [selectedModel, setSelectedModel] = useState("");
  const [checkingUpdates, setCheckingUpdates] = useState(false);
  const [updateResults, setUpdateResults] = useState(null); // model update probe results
  const [updateSelections, setUpdateSelections] = useState({}); // provider_id -> selected model list

  const loadProfiles = useCallback(async () => {
    try {
      const data = await api("GET", "/api/llm-profiles");
      setProviders(data.providers || []);
      setLoading(false);
    } catch (e) {
      setLoading(false);
    }
  }, []);

  const loadGwModels = useCallback(async () => {
    const result = {};
    for (const gw of gateways.filter(g => g.role !== "herald")) {
      try {
        const m = await api("GET", `/api/gateways/${gw.id}/model`);
        result[gw.id] = m;
      } catch (e) {
        result[gw.id] = { primary: "?", fallbacks: [] };
      }
    }
    setGwModels(result);
  }, [gateways]);

  useEffect(() => { loadProfiles(); loadGwModels(); }, [loadProfiles, loadGwModels]);

  const allModels = useMemo(() => {
    const out = [];
    for (const p of providers) {
      for (const m of (p.models || [])) {
        out.push({ full_id: `${p.id}/${m.id}`, label: m.label || m.id, provider: p.label || p.id });
      }
    }
    return out;
  }, [providers]);

  const saveKey = async (provId) => {
    try {
      await api("PUT", `/api/llm-profiles/providers/${provId}/key`, { api_key: keyInput });
      toast("API Key 已保存并同步到所有 Gateway", "success");
      setEditingKey(null);
      setKeyInput("");
      loadProfiles();
    } catch (e) {
      toast(e.message, "error");
    }
  };

  const addProvider = async () => {
    if (!newProv.id) { toast("Provider ID 不能为空", "error"); return; }
    // Build models list from picker selections (only models matching this provider)
    const models = pickedModels
      .filter(m => m.provider === newProv.id)
      .map(m => ({ id: m.model, label: m.model }));
    try {
      await api("POST", "/api/llm-profiles/providers", {
        id: newProv.id, label: newProv.label || newProv.id,
        base_url: newProv.base_url, api_format: newProv.api_format,
        models,
      });
      toast(`Provider "${newProv.id}" 已添加（${models.length} 个模型）`, "success");
      setShowAddProvider(false);
      setNewProv({ id: "", label: "", base_url: "", api_format: "" });
      setPickedModels([]);
      loadProfiles();
    } catch (e) { toast(e.message, "error"); }
  };

  const deleteProvider = async (provId) => {
    if (!confirm(`确定删除 Provider "${provId}"？`)) return;
    try {
      await api("DELETE", `/api/llm-profiles/providers/${provId}`);
      toast(`已删除 ${provId}`, "info");
      loadProfiles();
    } catch (e) { toast(e.message, "error"); }
  };

  const assignModel = async (gwId) => {
    if (!selectedModel) return;
    try {
      await api("PUT", `/api/gateways/${gwId}/model`, { primary: selectedModel });
      toast(`${gwId} 主模型已切换为 ${selectedModel}`, "success");
      setAssigningModel(null);
      setSelectedModel("");
      loadGwModels();
    } catch (e) { toast(e.message, "error"); }
  };

  const checkModelUpdates = async () => {
    setCheckingUpdates(true);
    try {
      const data = await api("POST", "/api/llm-profiles/check-updates");
      setUpdateResults(data.updates || []);
      // Pre-select only openclaw-supported discovered models
      const sel = {};
      for (const u of (data.updates || [])) {
        sel[u.provider_id] = u.discovered.filter(m => m.openclaw_supported !== false).map(m => m.id);
      }
      setUpdateSelections(sel);
    } catch (e) { toast("探测失败: " + e.message, "error"); }
    setCheckingUpdates(false);
  };

  const toggleUpdateModel = (provId, modelId) => {
    setUpdateSelections(prev => {
      const list = [...(prev[provId] || [])];
      const idx = list.indexOf(modelId);
      if (idx >= 0) list.splice(idx, 1); else list.push(modelId);
      return { ...prev, [provId]: list };
    });
  };

  const applyModelUpdates = async () => {
    const changes = [];
    for (const u of (updateResults || [])) {
      const selected = updateSelections[u.provider_id] || [];
      if (selected.length > 0) {
        const models = u.discovered.filter(m => selected.includes(m.id)).map(m => ({ id: m.id, label: m.label }));
        if (models.length > 0) changes.push({ provider_id: u.provider_id, models });
      }
    }
    if (!changes.length) { toast("未选择任何模型", "error"); return; }
    try {
      const result = await api("POST", "/api/llm-profiles/apply-updates", { changes });
      if (result.warning) {
        toast(result.warning, "error");
      }
      toast(`已更新 ${(result.applied || []).length} 个 Provider 的模型列表`, "success");
      setUpdateResults(null);
      loadProfiles();
    } catch (e) { toast(e.message, "error"); }
  };

  if (loading) return <div className="loading">加载中...</div>;

  return (
    <div style={{ padding: "20px 24px", height: "100%", overflowY: "auto" }}>
      <div className="section-title">🔑 LLM 令牌与模型管理</div>
      <div className="section-sub">统一管理所有 LLM Provider 的 API Key，为每个 Gateway 分配主模型</div>

      {/* Model Update Detection */}
      <div style={{ marginTop: 16, marginBottom: 8 }}>
        <button className="btn btn-ghost" onClick={checkModelUpdates} disabled={checkingUpdates}
          style={{ fontSize: 12 }}>
          {checkingUpdates ? "⏳ 正在探测各厂牌最新模型..." : "🔍 检查模型更新"}
        </button>
      </div>

      {updateResults && (
        <div style={{
          background: "var(--paper-strong)", border: "1px solid var(--border)",
          borderRadius: 14, padding: 16, marginBottom: 20,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>🔄 模型更新探测结果</div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn btn-primary" style={{ fontSize: 12 }} onClick={applyModelUpdates}>
                ✓ 应用选中的更新
              </button>
              <button className="btn btn-ghost" style={{ fontSize: 12 }} onClick={() => setUpdateResults(null)}>
                ✕ 关闭
              </button>
            </div>
          </div>
          {updateResults.map(u => {
            const sel = updateSelections[u.provider_id] || [];
            const hasChanges = u.new.length > 0 || u.removable.length > 0;
            return (
              <div key={u.provider_id} style={{
                padding: "10px 14px", borderRadius: 10, marginBottom: 8,
                background: "#fff", border: "1px solid var(--border)",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <span style={{ fontWeight: 700, fontSize: 13 }}>{u.provider_label}</span>
                  <span style={{
                    fontSize: 10, padding: "2px 6px", borderRadius: 6,
                    background: u.source === "api" ? "rgba(31,157,99,0.12)" : u.source === "failed" ? "rgba(199,75,63,0.12)" : "rgba(209,137,45,0.12)",
                    color: u.source === "api" ? "var(--ok)" : u.source === "failed" ? "var(--bad)" : "var(--accent)",
                    fontWeight: 600,
                  }}>{u.source === "api" ? "API 探测" : u.source === "failed" ? "探测失败" : "已知清单"}</span>
                  {!hasChanges && <span style={{ fontSize: 11, color: "var(--ok)" }}>✓ 已是最新</span>}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {u.discovered.map(m => {
                    const isNew = u.new.some(n => n.id === m.id);
                    const checked = sel.includes(m.id);
                    const unsupported = m.openclaw_supported === false;
                    return (
                      <label key={m.id} style={{
                        display: "flex", alignItems: "center", gap: 4,
                        fontSize: 12, padding: "3px 8px", borderRadius: 8,
                        cursor: unsupported ? "not-allowed" : "pointer",
                        opacity: unsupported ? 0.5 : 1,
                        background: unsupported ? "rgba(199,75,63,0.08)" : isNew ? "rgba(31,157,99,0.10)" : checked ? "rgba(209,137,45,0.10)" : "rgba(0,0,0,0.04)",
                        border: unsupported ? "1px solid rgba(199,75,63,0.3)" : isNew ? "1px solid rgba(31,157,99,0.3)" : "1px solid transparent",
                      }}>
                        <input type="checkbox" checked={checked && !unsupported} disabled={unsupported}
                          onChange={() => !unsupported && toggleUpdateModel(u.provider_id, m.id)}
                          style={{ width: 14, height: 14, accentColor: "var(--accent)" }} />
                        <span style={{ fontWeight: isNew ? 600 : 400 }}>{m.label || m.id}</span>
                        {isNew && !unsupported && <span style={{ fontSize: 9, color: "var(--ok)", fontWeight: 700 }}>NEW</span>}
                        {unsupported && <span style={{ fontSize: 9, color: "var(--bad)", fontWeight: 700 }} title="openclaw 不支持此模型">不兼容</span>}
                      </label>
                    );
                  })}
                </div>
                {u.removable.length > 0 && (
                  <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>
                    可移除旧模型: {u.removable.map(r => r.label).join(", ")}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Providers */}
      <div style={{ marginTop: 24 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div style={{ fontSize: 15, fontWeight: 700 }}>Provider 列表</div>
          <button className="btn btn-primary" onClick={() => setShowAddProvider(true)}>＋ 添加 Provider</button>
        </div>

        {showAddProvider && (
          <div style={{
            background: "var(--panel-strong)", border: "1px solid var(--border)",
            borderRadius: 14, padding: 16, marginBottom: 16,
          }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>新增 Provider</div>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 10 }}>从 openclaw 支持的模型列表中搜索并选择模型，Provider 信息会自动填充。</div>
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4, color: "var(--ink-soft)" }}>选择模型</div>
              <FuzzyModelPicker
                selected={pickedModels}
                onSelect={setPickedModels}
                onProviderDetected={(prov) => {
                  if (!newProv.id) setNewProv(prev => ({ ...prev, id: prov, label: prov.charAt(0).toUpperCase() + prov.slice(1) }));
                }}
              />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <input placeholder="Provider ID (如 openai)" value={newProv.id} onChange={e => setNewProv({...newProv, id: e.target.value})}
                style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13 }} />
              <input placeholder="显示名 (如 OpenAI)" value={newProv.label} onChange={e => setNewProv({...newProv, label: e.target.value})}
                style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13 }} />
              <input placeholder="Base URL (留空用默认)" value={newProv.base_url} onChange={e => setNewProv({...newProv, base_url: e.target.value})}
                style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13 }} />
              <input placeholder="API Format (如 anthropic-messages)" value={newProv.api_format} onChange={e => setNewProv({...newProv, api_format: e.target.value})}
                style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13 }} />
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center" }}>
              <button className="btn btn-primary" onClick={addProvider} disabled={!newProv.id || pickedModels.length === 0}>保存</button>
              <button className="btn btn-ghost" onClick={() => { setShowAddProvider(false); setPickedModels([]); }}>取消</button>
              {pickedModels.length > 0 && (() => {
                const matched = pickedModels.filter(m => m.provider === newProv.id).length;
                const unmatched = pickedModels.length - matched;
                return (
                  <React.Fragment>
                    <span style={{ fontSize: 12, color: "var(--ok)" }}>已选 {matched} 个模型</span>
                    {unmatched > 0 && (
                      <span style={{ fontSize: 11, color: "var(--bad)" }}>
                        ({unmatched} 个属于其他 provider，保存时将忽略)
                      </span>
                    )}
                  </React.Fragment>
                );
              })()}
            </div>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {providers.map(p => (
            <div key={p.id} style={{
              background: "#fff", border: "1px solid var(--border)", borderRadius: 14,
              padding: "14px 18px", display: "flex", flexDirection: "column", gap: 10,
            }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <span style={{ fontSize: 15, fontWeight: 700 }}>{p.label || p.id}</span>
                  <span style={{ fontSize: 12, color: "var(--muted)", marginLeft: 8 }}>{p.id}</span>
                  {p.base_url && <span style={{ fontSize: 11, color: "var(--accent-2)", marginLeft: 8 }}>{p.base_url}</span>}
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{
                    fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 8,
                    background: p.api_key_set ? "rgba(31,157,99,0.12)" : "rgba(199,75,63,0.12)",
                    color: p.api_key_set ? "var(--ok)" : "var(--bad)",
                  }}>{p.api_key_set ? "Key ✓" : "Key ✗"}</span>
                  <button className="btn btn-ghost" style={{ padding: "4px 8px", fontSize: 12 }}
                    onClick={() => { setEditingKey(p.id); setKeyInput(""); }}>
                    {p.api_key_set ? "更换" : "设置"} Key
                  </button>
                  <button className="btn btn-danger" style={{ padding: "4px 8px", fontSize: 12 }}
                    onClick={() => deleteProvider(p.id)}>删除</button>
                </div>
              </div>

              {/* Key masked display */}
              {p.api_key_set && editingKey !== p.id && (
                <div style={{ fontSize: 12, color: "var(--muted)", fontFamily: "JetBrains Mono" }}>
                  {p.api_key_masked}
                </div>
              )}

              {/* Key edit input */}
              {editingKey === p.id && (
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="password" placeholder="输入 API Key" value={keyInput}
                    onChange={e => setKeyInput(e.target.value)}
                    style={{
                      flex: 1, padding: "8px 10px", borderRadius: 8, fontSize: 13,
                      border: "1px solid var(--border)", fontFamily: "JetBrains Mono",
                    }} />
                  <button className="btn btn-primary" style={{ fontSize: 12 }} onClick={() => saveKey(p.id)}
                    disabled={!keyInput}>保存</button>
                  <button className="btn btn-ghost" style={{ fontSize: 12 }}
                    onClick={() => setEditingKey(null)}>取消</button>
                </div>
              )}

              {/* Models list */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {(p.models || []).map(m => (
                  <span key={m.id} style={{
                    fontSize: 12, padding: "3px 10px", borderRadius: 8,
                    background: "rgba(209,137,45,0.10)", color: "var(--ink-soft)", fontWeight: 500,
                  }}>{m.label || m.id}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Gateway Model Assignment */}
      <div style={{ marginTop: 32 }}>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>Gateway 模型分配</div>
        <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 12 }}>
          为每个 Gateway 实例选择主模型。切换后会自动写入 openclaw.json 和 auth-profiles.json。
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {gateways.filter(g => g.role !== "herald").map(gw => {
            const mc = gwModels[gw.id] || {};
            const isAssigning = assigningModel === gw.id;
            return (
              <div key={gw.id} style={{
                background: "#fff", border: "1px solid var(--border)", borderRadius: 12,
                padding: "12px 16px", display: "flex", alignItems: "center", gap: 12,
              }}>
                <span style={{ fontSize: 18 }}>{gw.emoji}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{gw.name}</div>
                  <div style={{ fontSize: 12, color: "var(--muted)", fontFamily: "JetBrains Mono" }}>
                    主模型: {mc.primary || "—"}
                  </div>
                  {mc.fallbacks && mc.fallbacks.length > 0 && (
                    <div style={{ fontSize: 11, color: "var(--muted)" }}>
                      备选: {mc.fallbacks.join(", ")}
                    </div>
                  )}
                </div>
                {isAssigning ? (
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)}
                      style={{ padding: "6px 8px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 12 }}>
                      <option value="">选择模型...</option>
                      {allModels.map(m => (
                        <option key={m.full_id} value={m.full_id}>
                          {m.provider} / {m.label}
                        </option>
                      ))}
                    </select>
                    <button className="btn btn-primary" style={{ padding: "5px 10px", fontSize: 12 }}
                      onClick={() => assignModel(gw.id)} disabled={!selectedModel}>确认</button>
                    <button className="btn btn-ghost" style={{ padding: "5px 10px", fontSize: 12 }}
                      onClick={() => setAssigningModel(null)}>取消</button>
                  </div>
                ) : (
                  <button className="btn" style={{ padding: "5px 12px", fontSize: 12 }}
                    onClick={() => { setAssigningModel(gw.id); setSelectedModel(mc.primary || ""); }}>
                    切换模型
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Model Selector (for GatewayDetail overview) ──────────────
function ModelSelector({ gatewayId }) {
  const [modelCfg, setModelCfg] = useState(null);
  const [providers, setProviders] = useState([]);
  const [editing, setEditing] = useState(false);
  const [selected, setSelected] = useState("");
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const [mc, llm] = await Promise.all([
          api("GET", `/api/gateways/${gatewayId}/model`),
          api("GET", "/api/llm-profiles"),
        ]);
        setModelCfg(mc);
        setProviders(llm.providers || []);
        setSelected(mc.primary || "");
      } catch (e) {}
    })();
  }, [gatewayId]);

  const allModels = useMemo(() => {
    const out = [];
    for (const p of providers) {
      for (const m of (p.models || [])) {
        out.push({ full_id: `${p.id}/${m.id}`, label: m.label || m.id, provider: p.label || p.id });
      }
    }
    return out;
  }, [providers]);

  const save = async () => {
    if (!selected) return;
    setSaving(true);
    try {
      await api("PUT", `/api/gateways/${gatewayId}/model`, { primary: selected });
      const mc = await api("GET", `/api/gateways/${gatewayId}/model`);
      setModelCfg(mc);
      setEditing(false);
      toast("主模型已切换", "success");
    } catch (e) {
      toast(e.message, "error");
    }
    setSaving(false);
  };

  if (!modelCfg) return null;

  return (
    <div className="info-card" style={{ gridColumn: "1 / -1" }}>
      <div className="info-label">主模型</div>
      {editing ? (
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 4 }}>
          <select value={selected} onChange={e => setSelected(e.target.value)}
            style={{ flex: 1, padding: "6px 8px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 13 }}>
            <option value="">选择模型...</option>
            {allModels.map(m => (
              <option key={m.full_id} value={m.full_id}>{m.provider} / {m.label}</option>
            ))}
          </select>
          <button className="btn btn-primary" style={{ padding: "5px 10px", fontSize: 12 }}
            onClick={save} disabled={saving || !selected}>确认</button>
          <button className="btn btn-ghost" style={{ padding: "5px 10px", fontSize: 12 }}
            onClick={() => setEditing(false)}>取消</button>
        </div>
      ) : (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span className="info-value" style={{ fontFamily: "JetBrains Mono", fontSize: 13 }}>
            {modelCfg.primary || "未配置"}
          </span>
          <button className="btn btn-ghost" style={{ padding: "3px 8px", fontSize: 11 }}
            onClick={() => { setEditing(true); setSelected(modelCfg.primary || ""); }}>切换</button>
        </div>
      )}
      {modelCfg.fallbacks && modelCfg.fallbacks.length > 0 && (
        <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>
          备选: {modelCfg.fallbacks.join(" → ")}
        </div>
      )}
    </div>
  );
}

const VIRTUAL_PAGE_IDS = new Set(["overview", "game", "llm", "materials", "personas"]);

function App() {
  const [gateways, setGateways] = useState([]);
  const [selectedId, setSelectedId] = useState("overview");
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);

  const loadGateways = useCallback(async (showErrors = false) => {
    try {
      const data = await api("GET", "/api/gateways");
      setGateways(data);
      setLoading(false);
      if (!VIRTUAL_PAGE_IDS.has(selectedId) && !data.find((gw) => gw.id === selectedId)) {
        setSelectedId("overview");
      }
    } catch (err) {
      if (showErrors) toast(err.message, "error");
      setLoading(false);
    }
  }, [selectedId]);

  useEffect(() => {
    loadGateways(true);
    const timer = setInterval(() => loadGateways(false), 4000);
    return () => clearInterval(timer);
  }, [loadGateways]);

  const selectedGateway = useMemo(
    () => gateways.find((gw) => gw.id === selectedId),
    [gateways, selectedId]
  );

  const startAll = async () => {
    try {
      await api("POST", "/api/start-all");
      toast("全部启动指令已发送", "success");
      setTimeout(loadGateways, 1200);
    } catch (err) {
      toast(err.message, "error");
    }
  };

  const stopAll = async () => {
    try {
      await api("POST", "/api/stop-all");
      toast("全部停止指令已发送", "info");
      setTimeout(loadGateways, 1200);
    } catch (err) {
      toast(err.message, "error");
    }
  };

  return (
    <div className="app">
      <Toasts />
      {showAdd && (
        <AddGatewayModal
          gateways={gateways}
          onClose={() => setShowAdd(false)}
          onAdded={() => {
            loadGateways();
            setSelectedId("overview");
          }}
        />
      )}
      <header className="header">
        <div className="header-brand">
          <div className="header-logo">HC</div>
          <div>
            <div className="header-title">OpenClaw Hub Manager</div>
            <div className="header-sub">Gateway 集群监控 · 日志 · 配置管理</div>
          </div>
        </div>
        <div className="header-meta">
          <div className="meta-pill">状态: <strong>{gateways.filter((g) => g.status === "running").length} 运行</strong></div>
          <div className="meta-pill">端口: <strong>61000</strong></div>
        </div>
        <div className="header-actions">
          <button className="btn btn-primary" onClick={() => setShowAdd(true)}>＋ 新增 Gateway</button>
          <button className="btn btn-ghost" onClick={startAll}>▶ 全部启动</button>
          <button className="btn btn-ghost" onClick={stopAll}>⏹ 全部停止</button>
          <button className="btn btn-ghost" onClick={loadGateways}>⟳ 刷新</button>
        </div>
      </header>
      <div className="layout">
        <Sidebar gateways={gateways} selectedId={selectedId} onSelect={setSelectedId} />
        <main className="content">
          {loading ? (
            <div className="loading">加载中...</div>
          ) : selectedId === "overview" ? (
            <OverviewPanel gateways={gateways} onSelect={setSelectedId} onRefresh={loadGateways} />
          ) : selectedId === "game" ? (
            <ArenaPanel />
          ) : selectedId === "materials" ? (
            <MaterialsPanel />
          ) : selectedId === "personas" ? (
            <PersonaLibraryPanel gateways={gateways} />
          ) : selectedId === "llm" ? (
            <LLMPanel gateways={gateways} />
          ) : selectedGateway ? (
            <GatewayDetail gateway={selectedGateway} onRefresh={loadGateways} onDelete={loadGateways} />
          ) : (
            <div className="empty-state">未找到 Gateway</div>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
